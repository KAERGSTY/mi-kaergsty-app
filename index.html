<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKaergsty Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0a0a0a; color: #ffffff; font-family: 'Segoe UI', sans-serif; }
        #vista-catalogo { padding: 30px; max-width: 1200px; margin: 0 auto; }
        .header-catalogo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .titulo-principal { font-size: 30px; font-weight: 800; color: #0088cc; margin: 0; }
        #buscador { background: #1a1a1a; border: 1px solid #333; color: white; padding: 10px 20px; border-radius: 30px; outline: none; }
        .grid-animes { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .tarjeta-anime { position: relative; border-radius: 12px; overflow: hidden; cursor: pointer; aspect-ratio: 2/3; background: #151515; transition: 0.3s; }
        .tarjeta-anime:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,136,204,0.3); }
        .tarjeta-anime img { width: 100%; height: 100%; object-fit: cover; }
        .titulo-tarjeta { position: absolute; bottom: 0; width: 100%; padding: 10px 5px; background: rgba(0,0,0,0.8); font-size: 12px; text-align: center; font-weight: bold; }
        
        #vista-detalles { display: none; padding: 20px; }
        .btn-atras { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; margin-bottom: 20px; }
        .layout-detalles { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .img-lateral { width: 280px; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .img-lateral img { width: 100%; display: block; }
        .info-derecha { flex: 1; min-width: 300px; }
        .tag { background: #0088cc; padding: 5px 12px; border-radius: 15px; font-size: 12px; margin-right: 5px; font-weight: bold; }
        .caja-botones { background: #1a1a1a; padding: 20px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-accion { background: #0088cc; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-v { background: none; border: none; color: #ff4444; cursor: pointer; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="vista-catalogo">
        <div class="header-catalogo">
            <h1 class="titulo-principal">AKaergsty</h1>
            <input type="text" id="buscador" placeholder="Buscar..." oninput="filtrar()">
        </div>
        <div class="grid-animes" id="grid"></div>
    </div>

    <div id="vista-detalles">
        <button class="btn-atras" onclick="cerrar()">← VOLVER</button>
        <div class="layout-detalles">
            <div class="img-lateral"><img id="det-img" src=""></div>
            <div class="info-derecha">
                <h1 id="det-titulo"></h1>
                <div id="det-generos" style="margin-bottom: 15px;"></div>
                <p id="det-sinopsis" style="line-height: 1.6; color: #ccc;"></p>
                <div class="caja-botones" id="area-botones"></div>
            </div>
        </div>
    </div>

    <script>
        // CORRECCIÓN: Se añade /img/ al final de la ruta
        const urlBaseGitHub = "https://raw.githubusercontent.com/Kaergsty/KAERGSTY-BOT/main/img/";

        const base = {
            "Jigokuraku": {
                sinopsis: "El ninja Gabimaru el Vacío es sentenciado a muerte, pero recibe una oportunidad de ser indultado si viaja a una isla misteriosa.",
                generos: ["Acción", "Fantasía oscura", "Gore"],
                enlaces: { "Temporada 1": { "Latino": "https://t.me/c/1/1" } }
            },
            "Kaguya-sama wa Kokurasetai": {
                sinopsis: "El orgullo les impide confesarse. Comienza una guerra cerebral de amor.",
                generos: ["Comedia Romántica", "Escolar", "Psicológico"],
                enlaces: { "Temporada 1": { "Latino": "https://t.me/AnimeKaergsty1/5069", "Japonés": "https://t.me/AnimeKaergsty1/5067" } }
            }
        };

        function cargar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            for (const nombre in base) {
                const div = document.createElement('div');
                div.className = 'tarjeta-anime';
                div.onclick = () => abrir(nombre);
                
                // IMPORTANTE: encodeURIComponent maneja los espacios de los nombres
                const imgUrl = urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
                
                div.innerHTML = `
                    <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/160x240/222/fff?text=Error+Link'">
                    <div class="titulo-tarjeta">${nombre}</div>
                `;
                grid.appendChild(div);
            }
        }

        function abrir(nombre) {
            const anime = base[nombre];
            const imgUrl = urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
            document.getElementById('det-img').src = imgUrl;
            document.getElementById('det-titulo').innerText = nombre;
            document.getElementById('det-sinopsis').innerText = anime.sinopsis;
            const gens = document.getElementById('det-generos');
            gens.innerHTML = "";
            anime.generos.forEach(g => gens.innerHTML += `<span class="tag">${g}</span>`);
            document.getElementById('vista-catalogo').style.display = 'none';
            document.getElementById('vista-detalles').style.display = 'block';
            mostrarT(nombre);
        }

        function mostrarT(nombre) {
            const area = document.getElementById('area-botones');
            area.innerHTML = `<b style="text-align:center; color:#888;">TEMPORADAS</b>`;
            Object.keys(base[nombre].enlaces).forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion';
                btn.innerText = t;
                btn.onclick = () => mostrarI(nombre, t);
                area.appendChild(btn);
            });
        }

        function mostrarI(nombre, t) {
            const area = document.getElementById('area-botones');
            const links = base[nombre].enlaces[t];
            area.innerHTML = `<b style="text-align:center; color:#888;">IDIOMAS - ${t}</b>`;
            Object.keys(links).forEach(idioma => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion';
                btn.innerText = idioma;
                btn.onclick = () => window.Telegram.WebApp.openLink(links[idioma]);
                area.appendChild(btn);
            });
            const back = document.createElement('button');
            back.className = 'btn-v';
            back.innerText = "← VOLVER";
            back.onclick = () => mostrarT(nombre);
            area.appendChild(back);
        }

        function cerrar() {
            document.getElementById('vista-detalles').style.display = 'none';
            document.getElementById('vista-catalogo').style.display = 'block';
        }

        function filtrar() {
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.tarjeta-anime').forEach(t => {
                t.style.display = t.innerText.toLowerCase().includes(busqueda) ? 'block' : 'none';
            });
        }

        cargar();
    </script>
</body>
</html>
