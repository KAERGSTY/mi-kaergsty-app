<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamBot App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 15px; }
        h2 { color: #0088cc; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: #333; border-radius: 10px; overflow: hidden; text-align: center; padding-bottom: 10px; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .btn-play { background: #0088cc; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>
    <h2>Mi Catálogo</h2>
    <div class="grid">
        <div class="card">
            <img src="poster01.jpg" alt="Anime 1"> <p>Episodio 01</p>
            <p>Episodio 01</p>
            <button class="btn-play" onclick="sendVideo('ep01')">Reproducir</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="Anime 2">
            <p>Episodio 02</p>
            <button class="btn-play" onclick="sendVideo('ep02')">Reproducir</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Expande la app a pantalla completa

        function sendVideo(id) {
            // Esto envía un mensaje al bot con el ID del video
            tg.sendData(id); 
            tg.close(); // Cierra la app después de elegir
        }
    </script>
</body>
</html>
