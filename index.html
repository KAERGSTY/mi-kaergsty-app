<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeKaergsty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        .card-container {
    perspective: 1000px; /* Importante para el efecto 3D */
    width: 160px; /* Ancho de tu tarjeta */
}

/* El elemento que realmente gira */
.card-inner {
    position: relative;
    width: 100%;
    height: 100%; /* Ajusta la altura si es necesario */
    transition: transform 0.6s;
    transform-style: preserve-3d; /* Mantiene las caras en 3D */
    cursor: pointer;
}

/* Clase que activaremos para girar la tarjeta */
.card-container.flipped .card-inner {
    transform: rotateY(180deg);
}

/* Estilo común para ambas caras */
.card-front, .card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    -webkit-backface-visibility: hidden; /* Oculta la cara trasera al girar */
    backface-visibility: hidden;
    border-radius: 12px;
    background: #2a2a2a; /* Fondo oscuro */
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

/* Cara Delantera: Normal, mira hacia adelante */
.card-front {
    transform: rotateY(0deg);
}

/* Cara Trasera: Girada 180 grados inicialmente */
.card-back {
    transform: rotateY(180deg);
    padding: 10px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
}
    </style>
</head>
<body>

    <h2>Anime Kaergsty</h2>

    <div id="modal-container" onclick="cerrarModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h4 id="modal-title" style="margin:0; color:#0088cc;">Opciones</h4>
            <div id="modal-buttons">
                </div>
            <button class="btn-cerrar" onclick="cerrarModal()">[ CERRAR ]</button>
        </div>
    </div>

    <div class="grid">
    <div class="card-container" id="anime1">
        <div class="card-inner" onclick="flipCard('anime1')"> <div class="card-front">
                <img src="https://i.postimg.cc/xxxxxx/poster01.jpg" alt="Kaguya-sama">
                <p>Kaguya-sama wa Kokurasetai</p>
            </div>
            
            <div class="card-back">
                <h3>Temporadas</h3>
                <div class="options-container">
                    </div>
                <p class="btn-voler">← Volver</p>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // AQUÍ GUARDAS LOS LINKS DE TUS ANIMES
        const datosKaguya = {
            "Temporada 1": {
                "Español": "https://t.me/AnimeKaergsty1/5067",
                "Japonés": "https://t.me/AnimeKaergsty1/5068"
            },
            "Temporada 2": {
                "Español": "https://t.me/AnimeKaergsty1/5069",
                "Japonés": "https://t.me/AnimeKaergsty1/5070"
            }
        };

        let animeActual = "";
        let datosActuales = {};

        // PASO 1: Mostrar Temporadas
        function iniciarSeleccion(titulo, datos) {
            animeActual = titulo;
            datosActuales = datos;
            mostrarTemporadas();
            document.getElementById('modal-container').classList.add('visible');
        }

        function mostrarTemporadas() {
            document.getElementById('modal-title').innerText = "Temporadas";
            const container = document.getElementById('modal-buttons');
            container.innerHTML = '';

            for (const temp in datosActuales) {
                const btn = document.createElement('button');
                btn.className = 'btn-opcion';
                btn.innerText = temp;
                btn.onclick = () => mostrarIdiomas(temp); // Al hacer clic, va a idiomas
                container.appendChild(btn);
            }
        }

        // PASO 2: Mostrar Idiomas de esa Temporada
        function mostrarIdiomas(temporada) {
            document.getElementById('modal-title').innerText = temporada;
            const container = document.getElementById('modal-buttons');
            container.innerHTML = '';

            const idiomas = datosActuales[temporada];

            for (const lang in idiomas) {
                const btn = document.createElement('button');
                btn.className = 'btn-opcion';
                btn.innerText = lang;
                btn.onclick = () => {
                    tg.openTelegramLink(idiomas[lang]); // Abre el link final
                    cerrarModal();
                };
                container.appendChild(btn);
            }

            // Botón para regresar a temporadas
            const btnVolver = document.createElement('button');
            btnVolver.innerText = "← Volver";
            btnVolver.className = 'btn-cerrar';
            btnVolver.style.color = "#aaa";
            btnVolver.onclick = mostrarTemporadas;
            container.appendChild(btnVolver);
        }

        function cerrarModal() {
            document.getElementById('modal-container').classList.remove('visible');
        }
    </script>
</body>
</html>
