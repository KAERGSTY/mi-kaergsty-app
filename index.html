<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeKaergsty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background: #1a1a1a; 
            color: white; 
            margin: 0; 
            padding-top: 20px; 
        }

        h2 { color: #0088cc; text-align: center; margin-bottom: 20px; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, 160px); 
            gap: 20px; 
            padding: 20px; 
            justify-content: center; 
        }

        .card {
            width: 160px;
            height: 310px; 
            perspective: 1000px; 
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            background: #2a2a2a;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-front img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }
        .card-front p {
            font-size: 14px;
            font-weight: bold;
            margin: 10px;
            text-align: center;
        }

        .card-back {
            transform: rotateY(180deg);
            background: #202020;
            border: 2px solid #0088cc;
            padding: 10px;
            box-sizing: border-box;
            justify-content: center; /* Centra los botones verticalmente */
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .btn-opcion {
            background: #0088cc;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-opcion:active {
            background: #005f8d;
        }

        .btn-volver {
            background: transparent;
            color: #aaaaaa;
            border: none;
            margin-top: 20px;
            font-size: 11px;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h2>Anime Kaergsty</h2>

    <div class="grid">
        <div class="card" id="anime1">
            <div class="card-inner">
                <div class="card-front" onclick="seleccionarTemporadas('anime1')">
                    <img src="img/poster01.jpg" alt="Kaguya">
                    <p>Kaguya-sama wa Kokurasetai</p>
                </div>
                <div class="card-back" id="back-anime1"></div>
            </div>
        </div>

        <div class="card" id="anime2">
            <div class="card-inner">
                <div class="card-front" onclick="seleccionarTemporadas('anime2')">
                    <img src="img/poster02.jpg" alt="Kaguya 2">
                    <p>Kaguya-sama wa Kokurasetai 2</p>
                </div>
                <div class="card-back" id="back-anime2"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const datosAnime = {
            "anime1": {
                "temporadas": {
                    "Temporada 1": { "Español": "https://t.me/link1", "Japonés": "https://t.me/link2" },
                    "Temporada 2": { "Español": "https://t.me/link3", "Japonés": "https://t.me/link4" }
                }
            },
            "anime2": {
                "temporadas": {
                    "Temporada 1": { "Español": "https://t.me/link5", "Japonés": "https://t.me/link6" }
                }
            }
        };

        let idAbierto = null; // Guarda cuál está girado actualmente

        function seleccionarTemporadas(id) {
            // 1. Si hay otro abierto, lo cerramos antes de abrir este
            if (idAbierto && idAbierto !== id) {
                cerrarCard(idAbierto);
            }

            // 2. Si tocamos el que ya está abierto, lo cerramos
            if (idAbierto === id) {
                cerrarCard(id);
                idAbierto = null;
                return;
            }

            const anime = datosAnime[id];
            const back = document.getElementById('back-' + id);
            
            // Eliminamos el título "Temporadas" y el botón cerrar
            let html = `<div class="btn-container">`;
            for (let temp in anime.temporadas) {
                html += `<button class="btn-opcion" onclick="event.stopPropagation(); seleccionarIdiomas('${id}', '${temp}')">${temp}</button>`;
            }
            html += `</div>`;
            
            back.innerHTML = html;
            document.getElementById(id).classList.add('flipped');
            idAbierto = id;
        }

        function seleccionarIdiomas(id, temporada) {
            const anime = datosAnime[id];
            const idiomas = anime.temporadas[temporada];
            const back = document.getElementById('back-' + id);
            
            let html = `<div class="btn-container">`;
            for (let lang in idiomas) {
                html += `<button class="btn-opcion" onclick="event.stopPropagation(); abrirLink('${idiomas[lang]}')">${lang}</button>`;
            }
            html += `</div><button class="btn-volver" onclick="event.stopPropagation(); seleccionarTemporadas('${id}')">← Volver</button>`;
            
            back.innerHTML = html;
        }

        function abrirLink(url) {
            tg.openTelegramLink(url);
        }

        function cerrarCard(id) {
            document.getElementById(id).classList.remove('flipped');
        }
    </script>
</body>
</html>
