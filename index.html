<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeKaergsty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background: #1a1a1a; 
            color: white; 
            margin: 0; 
            padding-top: 20px; 
        }

        h2 { color: #0088cc; text-align: center; margin-bottom: 20px; }

        .search-container {
            text-align: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        #buscador {
            width: 100%;
            max-width: 350px;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid #2a2a2a;
            background: #1c1c1c;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
        }

        #buscador:focus {
            border-color: #0088cc;
            box-shadow: 0 0 10px rgba(0, 136, 204, 0.3);
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, 160px); 
            gap: 20px; 
            padding: 20px; 
            justify-content: center; 
        }

        .card {
            width: 160px;
            height: 310px; 
            perspective: 1000px; 
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border-radius: 12px;
            overflow: hidden;
        }

        .card-front {
            background: #2a2a2a;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-front img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .card-front p {
            font-size: 14px;
            font-weight: bold;
            margin: 10px;
            text-align: center;
        }

        /* --- BACK SIN CUADROS BLANCOS --- */
        .card-back {
            transform: rotateY(180deg);
            background: #121212; /* Fondo oscuro sólido */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: none; /* Quitamos bordes */
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            align-items: center;
        }

        .btn-opcion {
            background: #0088cc;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            width: 90%;
            transition: background 0.2s;
        }

        .btn-opcion:active { background: #005f8d; }

        .titulo-back {
            color: #aaa;
            font-size: 12px;
            margin-bottom: 5px;
            text-align: center;
        }

        .btn-cerrar {
            background: none;
            border: none;
            color: #cc0000;
            font-weight: bold;
            margin-top: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>Anime Kaergsty</h2>

    <div class="search-container">
        <input type="text" id="buscador" placeholder="Buscar anime..." oninput="filtrarAnimes()">
    </div>

    <div class="grid" id="catalogo"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let idAbierto = null;
        let temporizadorCierre;

        const listaAnimes = [
            "Kaguya-sama wa Kokurasetai", "29 sai Dokushin Chuuken Boukensha no Nichijou",
            "Akuyaku Reijou wa Ringoku no Outaishi ni Dekiai sareru", "Android wa Keiken Ninzuu ni Hairimasu ka",
            "Arne no Jikenbo", "Champignon no Majo", "Dark Moon Tsuki no Saidan", "Darwin Jihen",
            "Dead Account", "Demi_chan_wa_kataritai", "Eris no Seihai", "Gaikotsu Kishi sama Tadaima Isekai e Odekakechuu",
            "Goumon Baito-kun no Nichijou", "Hanazakari no Kimitachi e", "Hell Mode Yarikomizuki no Gamer wa Hai Settei no Isekai de Musou suru",
            "Hikuidori_Ushuu_Boro_Tobi_gumi", "Ikoku Nikki", "Isekai no Sata wa Shachiku Shidai", "Jigokuraku",
            "Jingai Kyoushitsu no Ningengirai Kyoushi", "Kaya chan wa Kowakunai", "Kirei ni Shitemoraemasu ka",
            "Kizoku Tensei Megumareta Umare kara Saikyou no Chikara wo Eru", "Majutsushi Kunon wa Mieteiru",
            "Maou no Musume wa Yasashisugiru!!", "Mayonaka Heart Tune", "Odayaka Kizoku no Kyuuka no Susume",
            "Okashi na Tensei", "Okiraku Ryoushu no Tanoshii Ryouchi Bouei", "Omagoto",
            "Osananajimi to wa Love Comedy ni Naranai", "Seihantai na Kimi to Boku", "Shibou Yuugi de Meshi wo Kuu",
            "Tamon kun Ima Docchi", "Tensei shitara Dragon no Tamago datta", "Toumei Otoko to Ningen Onna Sonouchi Fuufu ni Naru Futari",
            "Uruwashi no Yoi no Tsuki", "Yuusha Party ni Kawaii Ko ga Ita node, Kokuhaku shitemita",
            "Yuusha Party wo Oidasareta Kiyoubinbou", "Yuusha kei ni Shosu Choubatsu Yuusha 9004 tai Keimu Kiroku", "Yuusha no Kuzu"
        ];

        const enlacesAnime = {
    "Jigokuraku": {
        "Temporada 1": {
            "Latino": "https://t.me/AnimeKaergsty1/4808",
            "Japonés": "https://t.me/AnimeKaergsty1/4805"
        },
        "Temporada 2": {
            "Latino": "https://t.me/AnimeKaergsty1/4443",
            "Japonés": "https://t.me/AnimeKaergsty1/4153"
        }
    }, // <--- No olvides esta coma para separar los animes
    "Kaguya-sama wa Kokurasetai": {
        "Temporada 1": {
            "Latino": "https://t.me/AnimeKaergsty1/5069",
            "Japonés": "https://t.me/AnimeKaergsty1/5067"
        },
        "Temporada 2": {
            "Latino": "https://t.me/AnimeKaergsty1/5073",
            "Japonés": "https://t.me/AnimeKaergsty1/5071"
        },
        "Temporada 3": {
            "Latino": "https://t.me/AnimeKaergsty1/5078",
            "Japonés": "https://t.me/AnimeKaergsty1/5075"
    }
};

// 3. LA FUNCIÓN QUE TE MANDÉ (Pégala aquí)
function seleccionarTemporadas(nombreAnime) {
    const infoAnime = enlacesAnime[nombreAnime];
    const contenedorBack = document.getElementById(`back-${nombreAnime}`);
    
    // Esto limpia lo que había antes (el "Próximamente" o botones viejos)
    contenedorBack.innerHTML = `<p class="titulo-temp">${nombreAnime}</p>`;

    if (infoAnime) {
        // Este comando crea un botón por cada temporada que encuentre en el objeto
        Object.keys(infoAnime).forEach(temp => {
            const btn = document.createElement('button');
            btn.innerText = temp;
            btn.className = "btn-temporada"; // Asegúrate de tener esta clase en tu CSS
            btn.onclick = () => mostrarIdiomas(nombreAnime, temp);
            contenedorBack.appendChild(btn);
        });
    } else {
        contenedorBack.innerHTML += "<p>Próximamente</p>";
    }
    
    // Botón para volver/cerrar
    const btnCerrar = document.createElement('button');
    btnCerrar.innerText = "CERRAR";
    btnCerrar.className = "btn-rojo";
    btnCerrar.onclick = () => cerrarTarjeta(nombreAnime);
    contenedorBack.appendChild(btnCerrar);
}

// 4. Tu función generarCatalogo() que ya tenías
function generarCatalogo() {
            const contenedor = document.getElementById('catalogo');
            contenedor.innerHTML = "";
            listaAnimes.forEach((nombre, index) => {
                const id = `anime${index}`;
                const nombreLimpio = nombre.replace(/_/g, ' '); 
                contenedor.innerHTML += `
                    <div class="card" id="${id}">
                        <div class="card-inner">
                            <div class="card-front" onclick="mostrarTemporadas('${id}', '${nombre}')">
                                <img src="img/${nombre}.webp" alt="${nombreLimpio}">
                                <p class="titulo-anime">${nombreLimpio}</p>
                            </div>
                            <div class="card-back" id="back-${id}"></div>
                        </div>
                    </div>`;
            });
        }

        function iniciarTimer(id) {
            clearTimeout(temporizadorCierre);
            temporizadorCierre = setTimeout(() => cerrarCard(id), 5000);
        }

        function mostrarTemporadas(id, nombre) {
            // 1. Cerrar el anterior si existe
            if (idAbierto && idAbierto !== id) {
                const anterior = document.getElementById(idAbierto);
                if (anterior) anterior.classList.remove('flipped');
            }

            const back = document.getElementById('back-' + id);
            const info = enlacesAnime[nombre];

            if (!info) {
                back.innerHTML = `
                    <div class="btn-container">
                        <p class="titulo-back">${nombre}</p>
                        <button class="btn-opcion" style="background:#444;">Próximamente</button>
                        <button class="btn-cerrar" onclick="cerrarCard('${id}')">CERRAR</button>
                    </div>`;
            } else {
                let botones = "";
                for (let temp in info) {
                    botones += `<button class="btn-opcion" onclick="mostrarIdiomas('${id}', '${nombre}', '${temp}')">${temp}</button>`;
                }
                back.innerHTML = `<div class="btn-container"><p class="titulo-back">Temporadas</p>${botones}<button class="btn-cerrar" onclick="cerrarCard('${id}')">CERRAR</button></div>`;
            }

            document.getElementById(id).classList.add('flipped');
            idAbierto = id;
            iniciarTimer(id);
        }

        function mostrarIdiomas(id, nombre, temporada) {
            const back = document.getElementById('back-' + id);
            const idiomas = enlacesAnime[nombre][temporada];
            let botones = "";
            for (let lang in idiomas) {
                botones += `<button class="btn-opcion" onclick="tg.openTelegramLink('${idiomas[lang]}')">${lang}</button>`;
            }
            back.innerHTML = `<div class="btn-container"><p class="titulo-back">${temporada}</p>${botones}<button class="btn-cerrar" onclick="mostrarTemporadas('${id}', '${nombre}')">← Volver</button></div>`;
            iniciarTimer(id);
        }

        function cerrarCard(id) {
            const card = document.getElementById(id);
            if (card) card.classList.remove('flipped');
            if (idAbierto === id) idAbierto = null;
            clearTimeout(temporizadorCierre);
        }

        function filtrarAnimes() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.card').forEach(t => {
                const titulo = t.querySelector('.titulo-anime').innerText.toLowerCase();
                t.style.display = titulo.includes(texto) ? "block" : "none";
            });
        }

        generarCatalogo();
    </script>
</body>
</html>
