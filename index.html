<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKaergsty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* MANTENGO TU DISEÑO ORIGINAL */
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: sans-serif;
        }
        #vista-catalogo { padding: 20px; }
        .grid-animes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        .tarjeta-anime {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 2/3;
        }
        .tarjeta-anime img { width: 100%; height: 100%; object-fit: cover; }
        .titulo-tarjeta {
            position: absolute;
            bottom: 0; width: 100%;
            background: rgba(0,0,0,0.7);
            text-align: center;
            padding: 5px 0;
            font-size: 14px;
        }
        /* Estilos de la vista de detalles (como los tenías antes) */
        #vista-detalles { display: none; padding: 20px; }
        .btn-atras { margin-bottom: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="vista-catalogo">
        <h1>AKaergsty</h1>
        <div class="grid-animes" id="grid"></div>
    </div>

    <div id="vista-detalles">
        <button class="btn-atras" onclick="cerrar()">Volver</button>
        <div id="contenido-detalle"></div>
    </div>

    <script>
        // LA RUTA CORRECTA A TU CARPETA IMG
        const urlBaseGitHub = "https://raw.githubusercontent.com/Kaergsty/KAERGSTY-BOT/main/img/";

        const base = {
            "Jigokuraku": {
                sinopsis: "El ninja Gabimaru...",
                enlaces: { "T1": { "Latino": "https://t.me/..." } }
            },
            "Kaguya-sama wa Kokurasetai": {
                sinopsis: "Guerra cerebral de amor...",
                enlaces: { "T1": { "Latino": "https://t.me/AnimeKaergsty1/5069" } }
            }
        };

        function cargar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            for (const nombre in base) {
                const div = document.createElement('div');
                div.className = 'tarjeta-anime';
                div.onclick = () => abrir(nombre);
                
                // ESTA ES LA CLAVE: Une la ruta + nombre con espacios + .webp
                const imgUrl = urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
                
                div.innerHTML = `
                    <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150x225?text=Error'">
                    <div class="titulo-tarjeta">${nombre}</div>
                `;
                grid.appendChild(div);
            }
        }

        function abrir(nombre) {
            const anime = base[nombre];
            const imgUrl = urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
            const detalle = document.getElementById('contenido-detalle');
            
            detalle.innerHTML = `
                <img src="${imgUrl}" style="width:200px; border-radius:10px;">
                <h1>${nombre}</h1>
                <p>${anime.sinopsis}</p>
                <div id="botones-temp"></div>
            `;
            
            document.getElementById('vista-catalogo').style.display = 'none';
            document.getElementById('vista-detalles').style.display = 'block';
            
            // Lógica simple de botones
            const areaBtn = document.getElementById('botones-temp');
            for(let t in anime.enlaces) {
                let b = document.createElement('button');
                b.innerText = t;
                b.onclick = () => {
                    for(let idio in anime.enlaces[t]) {
                        window.Telegram.WebApp.openLink(anime.enlaces[t][idio]);
                    }
                };
                areaBtn.appendChild(b);
            }
        }

        function cerrar() {
            document.getElementById('vista-detalles').style.display = 'none';
            document.getElementById('vista-catalogo').style.display = 'block';
        }

        cargar();
    </script>
</body>
</html>
