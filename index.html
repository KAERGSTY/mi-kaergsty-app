<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeKaergsty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
        font-family: sans-serif; 
        background: #1a1a1a; 
        color: white; 
        margin: 0; 
        padding-top: 50px; 
    }

    h2 { 
        color: #0088cc; 
        text-align: center;
        margin-bottom: 30px; 
    }

    .grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, 160px); 
        gap: 20px; 
        padding: 20px; 
        justify-content: center; /* Centra el catálogo */
    }

    /* ESTO ARREGLA EL TAMAÑO DE LA IMAGEN */
    .card {
        background: #2a2a2a; /* Un gris oscuro para que resalte */
        border-radius: 12px;
        overflow: hidden; /* Corta las esquinas de la imagen para que sigan el radio */
        cursor: pointer;
        transition: transform 0.2s;
        text-align: center;
    }

    .card img {
        width: 100%;    /* Se ajusta al ancho de la tarjeta (160px) */
        height: 230px;  /* Altura fija para que todas sean iguales */
        object-fit: cover; /* Recorta la imagen para que no se estire */
        display: block;
    }

    .card:hover {
        transform: scale(1.05); /* Se agranda un poquito al tocarla */
    }

    .card p {
        font-size: 14px;
        font-weight: bold;
        margin: 10px 5px;
        color: white; /* Cambiado a blanco para que se lea bien */
    }
    </style>
</head>
<body>
    <h2>Anime Kaergsty</h2>
    <div class="grid">
        <div class="card" onclick="sendVideo('ep01')">
            <img src="poster01.jpg" alt="Anime 1">
            <p>Kaguya-sama wa Kokurasetai</p>
        </div>

        <div class="card" onclick="sendVideo('ep02')">
            <img src="poster02.jpg" alt="Anime 2">
            <p>Kaguya-sama wa Kokurasetai2</p>
        </div>
        
        </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function sendVideo(id) {
            tg.sendData(id);
            tg.close();
        }
</body>
</html>
