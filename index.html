<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AnimeKaergsty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #0c0c0f;
            background-image:
                radial-gradient(ellipse 80% 40% at 20% 60%, rgba(134, 112, 156, 0.6) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 30%, rgba(18, 67, 230, 0.5) 0%, transparent 60%);
            background-size: 300% 300%;
            animation: moverFondo 10s ease infinite;
            color: #d4d4d8;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;

        }
        @keyframes moverFondo {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        #vista-catalogo { 
            padding: 20px;  
            width: 100%;
            max-width: 1200px; 
            margin: 0 auto;
            box-sizing: border-box;
        }
        .header-catalogo {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap; gap: 15px;
        }
        .titulo-principal { 
            font-size: 28px; 
            font-weight: 800; 
            color: #00aaff; 
            margin: 0; 
            letter-spacing: 1px; 
            animation: brilloSutil 3s ease-in-out infinite; 
        }
        @keyframes brilloSutil {
            0%, 100% { text-shadow: 0 0 5px rgba(0, 136, 204, 0.4); }
            50% { text-shadow: 0 0 15px rgba(0, 170, 255, 0.9), 0 0 25px rgba(0, 170, 255, 0.5); color: #33bbff; }
        }
        #buscador {
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white;
            padding: 10px 18px; 
            border-radius: 30px; 
            width: 230px; 
            outline: none;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
        }
        .tecleando {animation: golpeNeon 0.3s ease-out;}

        @keyframes golpeNeon {
            0% { transform: scale(1); box-shadow: 0 0 0px rgba(0, 170, 255, 0); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 170, 255, 0.8); border-color: #00aaff; }
            100% { transform: scale(1.02); box-shadow: 0 0 10px rgba(0, 170, 255, 0.4); border-color: #00aaff; }
        }

        #buscador:focus { 
            border-color: #00aaff; 
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.5); /* Brillo neón */
            transform: scale(1.05); /* Se agranda un poquito */
        }
        .grid-animes { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .tarjeta-anime {
            position: relative; border-radius: 10px; overflow: hidden; cursor: pointer;
            aspect-ratio: 2/3; transition: 0.3s ease-out;
            background: #151515;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .tarjeta-anime:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0, 136, 204, 0.3); border-color: rgba(0, 136, 204, 0.4);}
        .tarjeta-anime img { width: 100%; height: 100%; object-fit: cover; }
        .titulo-tarjeta {
            position: absolute; bottom: 0; width: 100%; padding: 25px 5px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            font-size: 13px; font-weight: bold; text-align: center; box-sizing: border-box;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        #vista-detalles { 
            display: none; min-height: 100vh; position: relative; 
            width: 100%; max-width: 1200px; margin: 0 auto; box-sizing: border-box;
            padding-bottom: 40px; 
        }
        .bg-banner {
            position: absolute; top: 0; left: 0; width: 100vw; 
            height: 500px; 
            z-index: -2; opacity: 0.3; filter: blur(45px); object-fit: cover;
            margin-left: calc(-50vw + 50%);
        }
        .layout-detalles {
            display: flex; gap: 30px; 
            max-width: 1100px; margin: 0 auto;
            padding: 20px; align-items: flex-start; box-sizing: border-box;
        }
        .img-lateral {
            flex: 0 0 260px; 
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.08);
            margin-top: 20px;
        }
        .img-lateral img { width: 100%; display: block; }
        .info-derecha { flex: 1; display: flex; flex-direction: column; gap: 8px; position: relative;}
        .header-info { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 5px; flex-wrap: wrap; }
        .titulo-anime { font-size: 36px; margin: 0; font-weight: 800; line-height: 1.1; flex: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
        .estado-container {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; font-weight: 600; color: #aaa;
            margin-top: -5px; 
        }
        .punto {
            width: 9px; height: 9px; border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 5px rgba(255,255,255,0.2);
        }
        .punto-rojo { background-color: #ff4444; animation: pulsoRojo 1.5s infinite ease-in-out; }
        @keyframes pulsoRojo {
            0% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 0 5px rgba(255, 68, 68, 0); }
            100% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }
        .punto-verde { background-color: #00cc66; animation: pulsoVerde 1.5s infinite ease-in-out; }
        @keyframes pulsoVerde {
            0% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 204, 102, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 0 5px rgba(0, 204, 102, 0); }
            100% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 204, 102, 0); }
        }
        .txt-finalizado { color: #ff6666; }
        .txt-emision { color: #00ff88; }
        .soporte-container {
            display: flex; gap: 10px; align-items: center;
            margin-top: 5px; 
        }
        .btn-soporte {
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            color: #999; 
            padding: 8px 16px; border-radius: 20px;
            font-size: 12px; font-weight: bold; text-transform: uppercase;
            cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(5px); 
            display: flex; align-items: center; gap: 6px;
        }
        .btn-soporte:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }
        .btn-subs {
            color: #0088cc;
            border-color: rgba(0, 136, 204, 0.3);
            animation: pulsoBordeSubs 2.5s infinite;
        }
        .btn-subs:hover {
            color: #fff;
            background: rgba(0, 136, 204, 0.15);
            border-color: rgba(0, 136, 204, 0.6);
        }
        @keyframes pulsoBordeSubs {
            0% { box-shadow: 0 0 0 0 rgba(0, 136, 204, 0.15); border-color: rgba(0, 136, 204, 0.2); }
            50% { box-shadow: 0 0 0 4px rgba(0, 136, 204, 0); border-color: rgba(0, 136, 204, 0.5); }
            100% { box-shadow: 0 0 0 0 rgba(0, 136, 204, 0); border-color: rgba(0, 136, 204, 0.2); }
        }
        .btn-donar {
            color: #ff4444;
            border-color: rgba(255, 68, 68, 0.3);
            animation: pulsoBordeDonar 2.5s infinite;
        }
        .btn-donar:hover {
            color: #fff;
            background: rgba(255, 68, 68, 0.15);
            border-color: rgba(255, 68, 68, 0.6);
        }
        @keyframes pulsoBordeDonar {
            0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.15); border-color: rgba(255, 68, 68, 0.2); }
            50% { box-shadow: 0 0 0 4px rgba(255, 68, 68, 0); border-color: rgba(255, 68, 68, 0.5); }
            100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); border-color: rgba(255, 68, 68, 0.2); }
        }
        .nombres-opcionales {
            display: flex; flex-direction: column; gap: 2px;
            margin-top: 2px; margin-bottom: 10px;
            font-size: 13px; color: #888;
        }
        .nombres-linea { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .tag-idioma {
            font-style: italic; background: rgba(255,255,255,0.03);
            padding: 3px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.04);
        }
        .generos { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 15px; }
        .tag { background: rgba(0, 136, 204, 0.2); border: 1px solid rgba(0, 136, 204, 0.4); color: #66ccff; padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.5);}
        .contenedor-sinopsis-acciones {
            background: rgba(20, 20, 25, 0.4); backdrop-filter: blur(12px);
            border-radius: 14px; border-left: 4px solid #0088cc;
            margin-bottom: 25px; box-sizing: border-box;
            border-top: 1px solid rgba(255,255,255,0.03);
            border-right: 1px solid rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .caja-sinopsis {
            padding: 20px; 
            line-height: 1.6; color: #ddd; font-size: 14px;
        }
        .caja-sinopsis p { margin: 0; }
        .barra-acciones {
            display: flex; gap: 10px; padding: 0 20px 15px; 
            flex-wrap: wrap;
        }
        .barra-acciones:empty { padding: 0; display: none; }
        .centro-botones { display: flex; justify-content: flex-start; width: 100%; margin-top: 10px;}
        .caja-botones {
            background: rgba(15, 18, 25, 0.65); backdrop-filter: blur(15px); 
            padding: 25px; border-radius: 20px;
            width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px;
            border: 1px solid rgba(255,255,255,0.06); box-sizing: border-box;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .txt-guia { 
            color: #888; font-size: 11px; text-transform: uppercase; 
            text-align: center; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px;
        }
        .btn-accion {
            background: rgba(0, 170, 255, 0.03); 
            color: #e0e0e0; 
            border: 1px solid rgba(0, 170, 255, 0.2); 
            padding: 14px; 
            border-radius: 12px; 
            font-weight: 500; 
            font-size: 15px; 
            letter-spacing: 0.5px;
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex; justify-content: center; align-items: center; gap: 8px;
            position: relative; overflow: hidden; 
        }
        .btn-accion:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(0, 136, 204, 0.4);
            border-color: rgba(255,255,255,0.3);
            background: linear-gradient(135deg, rgba(0, 153, 230, 0.9) 0%, rgba(0, 102, 153, 0.9) 100%);
        }
        .btn-accion:active { transform: scale(0.98) translateY(1px); box-shadow: 0 2px 10px rgba(0, 136, 204, 0.2); }
        .animar-entrada { opacity: 0; animation: entradaMinimalista 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes entradaMinimalista {
            0% { opacity: 0; transform: translateY(10px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .btn-comentario-especial {
            background: linear-gradient(135deg, rgba(0, 136, 204, 0.2) 0%, rgba(0, 85, 128, 0.4) 100%) !important;
            border: 1px solid rgba(0, 170, 255, 0.3) !important;
            margin-top: 15px !important;
            color: #00aaff !important;
            font-weight: bold !important;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-v { 
            background: transparent; border: 1px dashed rgba(255, 255, 255, 0.15); 
            color: #aaa; font-weight: 500; cursor: pointer; padding: 12px; 
            border-radius: 12px; margin-top: 5px; font-size: 13px; letter-spacing: 1px; transition: all 0.3s;
        }
        .btn-v:hover { background: rgba(255, 255, 255, 0.05); border-color: rgba(255, 255, 255, 0.5); color: #fff; }
        .btn-comentarios {
            background: transparent !important; border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #ccc; padding: 12px 20px; border-radius: 12px; font-weight: 500; cursor: pointer;
            transition: all 0.3s ease; letter-spacing: 1px; margin-top: 10px; width: 100%;
        }
        .btn-comentarios:hover { background: rgba(255, 255, 255, 0.05) !important; border-color: rgba(255, 255, 255, 0.4) !important; color: #fff; transform: translateY(-2px); }
        .btn-loading { opacity: 0.7; cursor: not-allowed; pointer-events: none; }
        .btn-loading::after { content: " ⌛"; animation: girar 1s infinite linear; display: inline-block; }
        .efecto-busqueda {animation: aparecerAnime 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes aparecerAnime {
            0% { opacity: 0; transform: scale(0.5) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- BOTÓN SECRETO ESTILOS --- */
        .btn-secreto {
            position: fixed; /* 'fixed' hace que se quede pegado a la pantalla, incluso si bajas */
            bottom: 1px;    /* Lo mandamos abajo, muy lejos de la 'X' */
            right: 1px;     /* Esquina inferior derecha */
            font-size: 24px; 
            opacity: 0.15;   
            cursor: pointer;
            z-index: 99999;  
            color: white;
            padding: 10px;   /* Área de toque más grande para el celular */
            user-select: none;
            transition: 1.3s;
        }
        .btn-secreto:hover { 
            opacity: 0.8; 
            color: #0088cc; 
        }

        @media (max-width: 850px) {
            .layout-detalles { flex-direction: column; align-items: center; gap: 15px; padding: 15px; }
            .img-lateral { width: 220px; flex: none; margin-top: 10px; }
            .info-derecha { align-items: center; text-align: center; width: 100%;}
            .header-info { flex-direction: column; align-items: center; gap: 5px; width: 100%; }
            .titulo-anime { font-size: 28px; text-align: center; width: 100%;}
            .estado-container { justify-content: center; margin-top: 2px;}
            .soporte-container { justify-content: center; margin-top: 10px; width: 100%;}
            .nombres-linea, .generos, .barra-acciones, .centro-botones { justify-content: center; }
            .caja-sinopsis { text-align: left; font-size: 13.5px; padding: 18px;}
        }
        @media (max-width: 768px) {
            #vista-catalogo { padding: 8px !important; }
            .grid-animes { grid-template-columns: repeat(3, 1fr) !important; gap: 8px !important; }
            .tarjeta-anime { min-width: 0 !important; border-radius: 8px; }
            .titulo-tarjeta { font-size: 11px !important; padding: 20px 4px 6px !important; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        }
    </style>
</head>
<body>

    <div class="controles-app" style="display: none;"></div>

    <div id="vista-catalogo">
        <div class="header-catalogo" style="flex-direction: column; align-items: center; gap: 12px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img src="https://cdn.iconscout.com/icon/free/png-256/free-avion-telegrama-icon-svg-download-png-3147579.png" 
                     style="height: 30px; width: auto; filter: drop-shadow(0 0 5px rgba(0, 170, 255, 0.4));">
                <h1 class="titulo-principal" style="margin: 0;">AnimeKaergsty</h1>
            </div>
            <input type="text" id="buscador" placeholder="Buscar anime..." oninput="filtrar()">
        </div>
        <div class="grid-animes" id="grid"></div>
    </div>

    <div id="vista-detalles">
        
        <span id="btn-secreto-link" class="btn-secreto" onclick="copiarLinkSecreto()">🔗</span>
        
        <img id="bg-bluroso" class="bg-banner" src="" alt="">
        <div class="layout-detalles">
            <div class="img-lateral">
                <img id="det-img" src="" alt="">
            </div>
            <div class="info-derecha">
                <div class="header-info">
                    <h1 id="det-titulo" class="titulo-anime"></h1>
                    <div id="det-soporte" class="soporte-container"></div>
                </div>
                <div id="det-nombres-opcionales" class="nombres-opcionales"></div>
                <div id="det-estado" class="estado-container"></div>
                <div id="det-generos" class="generos"></div>
                <div class="contenedor-sinopsis-acciones">
                    <div class="caja-sinopsis"><p id="det-sinopsis"></p></div>
                    <div id="barra-acciones" class="barra-acciones"></div>
                </div>
                <div class="centro-botones">
                    <div class="caja-botones" id="area-botones"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="anime.js"></script>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        tg.BackButton.onClick(() => {
            volverAlCatalogo();
        });

        const urlBaseGitHub = "https://raw.githubusercontent.com/Kaergsty/mi-kaergsty-app/main/img/";


        function cargar() {
            // 1. Lo primero que hacemos es esconder el botón por si acaso
            tg.BackButton.hide(); 

            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            
            const nombresInvertidos = Object.keys(base).reverse();

            nombresInvertidos.forEach(nombre => {
                const anime = base[nombre];
                const div = document.createElement('div');
                div.className = 'tarjeta-anime';
                div.onclick = () => abrir(nombre);
                
                let imgUrl = anime.portada ? anime.portada : urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
                
                div.innerHTML = `
                    <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150x225/222/555?text=Error+Img'">
                    <div class="titulo-tarjeta">${nombre}</div>
                `;
                grid.appendChild(div);
            });
            
            const params = window.Telegram.WebApp.initDataUnsafe.start_param;

            if (params) {
                let nombreBuscado = params.replace(/_/g, ' ').toLowerCase().trim();

                for (let nombreEnBase in base) {
                    let nombreLimpio = nombreEnBase.toLowerCase().trim();
                    if (nombreLimpio === nombreBuscado || nombreLimpio.startsWith(nombreBuscado)) {
                        abrir(nombreEnBase); // Aquí se activará el BackButton.show() y ya nadie lo esconderá
                        break; 
                    }
                }
            }
            // Borra el tg.BackButton.hide() que tenías aquí al final
        }

        // Variable global para que el botón de copiar sepa de qué anime sacar el link
        window.animeSeleccionado = "";

        function abrir(nombre) {
            window.animeSeleccionado = nombre; // Guardamos el nombre actual al abrir
            
            const anime = base[nombre];
            let imgUrl = anime.portada ? anime.portada : urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
            
            document.getElementById('det-img').src = imgUrl;
            document.getElementById('bg-bluroso').src = imgUrl;
            document.getElementById('det-titulo').innerText = nombre;
            document.getElementById('det-sinopsis').innerText = anime.sinopsis;

            const nomCont = document.getElementById('det-nombres-opcionales');
            nomCont.innerHTML = "";
            if (anime.nombresAlternativos) {
                const linea = document.createElement('div');
                linea.className = 'nombres-linea';
                for (const lang in anime.nombresAlternativos) {
                    const tag = document.createElement('span');
                    tag.className = 'tag-idioma';
                    tag.innerText = anime.nombresAlternativos[lang]; 
                    linea.appendChild(tag);
                }
                nomCont.appendChild(linea);
            }

            const sopCont = document.getElementById('det-soporte');
            const urlSuscripcion = "https://ko-fi.com/summary/db8dfda1-f2d5-4607-93c8-4ce3d83c9d0b"; 
            const urlDonacion = "https://paypal.me/AnimeKaergsty";
            
            sopCont.innerHTML = `
                <button class="btn-soporte btn-subs" onclick="abrirSoporte('${urlSuscripcion}')">★ Suscripción</button>
                <button class="btn-soporte btn-donar" onclick="abrirSoporte('${urlDonacion}')">♥ Donar</button>
            `;

            const estCont = document.getElementById('det-estado');
            let puntoClase = "punto-rojo", textoClase = "txt-finalizado";
            if (anime.estado === "En Emisión") { puntoClase = "punto-verde"; textoClase = "txt-emision"; }
            estCont.innerHTML = `<span>Estado:</span><span class="punto ${puntoClase}"></span><span class="${textoClase}">${anime.estado}</span>`;

            const gens = document.getElementById('det-generos');
            gens.innerHTML = "";
            anime.generos.forEach(g => { gens.innerHTML += `<span class="tag">${g}</span>`; });

            actualizarBarraAcciones();

            document.getElementById('vista-catalogo').style.display = 'none';
            document.getElementById('vista-detalles').style.display = 'block';
            window.scrollTo(0,0);
            
            mostrarT(nombre);
                    setTimeout(() => {
                if (typeof tg !== 'undefined' && tg.BackButton) {
                    tg.BackButton.show();
                    console.log("Botón Atrás forzado");
                }
            }, 150); 
        }

        function actualizarBarraAcciones() {
            const area = document.getElementById('barra-acciones');    
            area.innerHTML = "";
        }

        function abrirSoporte(url) { if (tg && tg.openLink) { tg.openLink(url); } else { window.open(url, '_blank'); } }

        function volverAlCatalogo() {
            document.getElementById('vista-detalles').style.display = 'none';
            document.getElementById('vista-catalogo').style.display = 'block';
            tg.BackButton.hide(); // <--- Asegúrate de que esta línea esté ahí
        }

        function mostrarT(nombre) {
            const area = document.getElementById('area-botones');
            area.innerHTML = '<span class="txt-guia">Temporadas</span>';
            
            const temporadas = Object.keys(base[nombre].enlaces);
            temporadas.forEach((t, index) => {
                const btn = document.createElement('button');
                btn.innerText = t;
                btn.className = 'btn-accion animar-entrada';
                btn.style.animationDelay = `${index * 0.1}s`;
                btn.onclick = () => mostrarI(nombre, t);
                area.appendChild(btn);
            });

            const btnCom = document.createElement('button');
            btnCom.innerText = "💬 COMENTARIOS";
            btnCom.className = "btn-comentarios animar-entrada"; 
            btnCom.onclick = function() { crearOabrirTopic(nombre, this); }; 
            area.appendChild(btnCom);
        }

        function mostrarI(nombre, t) {
            const area = document.getElementById('area-botones');
            const links = base[nombre].enlaces[t];
            area.innerHTML = `<span class="txt-guia">Idiomas - ${t}</span>`;
            Object.keys(links).forEach((idioma, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion animar-entrada';
                btn.style.animationDelay = `${index * 0.1}s`; 
                btn.innerHTML = `▶ ${idioma}`;
                btn.onclick = () => { 
                    if (window.Telegram && window.Telegram.WebApp) { 
                        window.Telegram.WebApp.openTelegramLink(links[idioma]); 
                    } else { 
                        window.open(links[idioma], '_blank'); 
                    } 
                };
                area.appendChild(btn);
            });
            const back = document.createElement('button');
            back.className = 'btn-v animar-entrada';
            back.style.animationDelay = `${Object.keys(links).length * 0.1}s`;
            back.innerText = "◄ 𝐴𝑇𝑅𝐴𝑆";
            back.onclick = () => mostrarT(nombre);
            area.appendChild(back);
        }

        function filtrar() {
            const input = document.getElementById('buscador');
            const v = input.value.toLowerCase();
            const tarjetas = document.querySelectorAll('.tarjeta-anime');

            input.classList.remove('tecleando');
            void input.offsetWidth; 
            input.classList.add('tecleando');

            tarjetas.forEach(t => {
                const coincide = t.innerText.toLowerCase().includes(v);
                
                if (coincide) {
                    if (t.style.display !== 'block') {
                        t.style.display = 'block';
                    }
                    t.classList.remove('efecto-busqueda');
                    void t.offsetWidth; 
                    t.classList.add('efecto-busqueda');
                } else {
                    t.style.display = 'none';
                    t.classList.remove('efecto-busqueda');
                }
            });
        }

        async function crearOabrirTopic(nombreAnime, elementoBoton) {
            const tg = window.Telegram.WebApp;
            const urlServidor = 'https://mi-kaergsty-app.onrender.com/crear-topic';

            if (elementoBoton.disabled) return;

            const textoOriginal = elementoBoton.innerText;
            elementoBoton.innerText = "CARGANDO...";
            elementoBoton.classList.add('btn-loading');
            
            elementoBoton.disabled = true; 
            elementoBoton.style.pointerEvents = 'none'; 

            try {
                const respuesta = await fetch(urlServidor, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombreAnime: nombreAnime })
                });
                
                const datos = await respuesta.json();

                if (datos.success) {
                    tg.openTelegramLink(datos.link);
                } else {
                    console.error("Error del servidor:", datos.error);
                    tg.showAlert(datos.error || "Hubo un problema al abrir los comentarios.");
                }
            } catch (e) {
                console.error("Error de red:", e);
                tg.showAlert("El servidor está despertando, intenta de nuevo en unos segundos.");
            } finally {
                elementoBoton.innerText = textoOriginal;
                elementoBoton.classList.remove('btn-loading');
                elementoBoton.disabled = false;
                elementoBoton.style.pointerEvents = 'auto';
            }
        }

        // --- FUNCIÓN DEL BOTÓN SECRETO ---
        function copiarLinkSecreto() {
            if (!window.animeSeleccionado) return;
            
            const parametro = window.animeSeleccionado.toLowerCase().trim().replace(/\s+/g, '_');
            const linkFinal = "https://t.me/Catalogo2026_bot/kaergsty?startapp=" + parametro;

            navigator.clipboard.writeText(linkFinal).then(() => {
                console.log("Enlace copiado: " + linkFinal);
                tg.MainButton.setText("¡ENLACE COPIADO!").show();
                setTimeout(() => tg.MainButton.hide(), 2000);
            }).catch(err => {
                console.error("Fallo al copiar: ", err);
            });
        }

        cargar();
    </script>
</body>
