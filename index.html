<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeKaergsty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 15px; }
        h2 { color: #0088cc; }
    
        .grid { 
    display: grid; 
    /* Esto crea columnas de 150px que se van llenando de izquierda a derecha */
    grid-template-columns: repeat(auto-fill, 150px); 
    gap: 15px; 
    padding: 10px;
    justify-content: start; /* Esto fuerza que todo empiece a la izquierda */
}
    .card { 
    background: #333; 
    border-radius: 10px; 
    overflow: hidden; 
    text-align: center; 
    padding-bottom: 10px;
    width: 150px; 
    height: 300px; 
    margin: 0; /* Cambiado de '0 auto' a '0' para que no se centre */
}

.card img { 
    width: 100%; 
    height: 200px; /* Alto fijo para la imagen dentro de la tarjeta */
    
    /* ESTO ES LO MÁS IMPORTANTE: Corta la imagen en lugar de estirarla */
    object-fit: cover; 
    
    border-radius: 10px 10px 0 0; 
}

        .btn-play { 
            background: #0088cc; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 5px; 
            cursor: pointer; 
            margin-top: 5px; 
        }
    </style>
</head>
<body>
    <h2>Mi Catálogo</h2>
    <div class="grid">
        <div class="card">
            <img src="poster01.jpg" alt="Anime 1">
            <p>Episodio 01</p>
            <button class="btn-play" onclick="sendVideo('ep01')">Reproducir</button>
        </div>
        </div>
    </script>
</body>
</html>
