<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AKaergsty Mini App</title>
    <style>
        /* --- ESTILOS BASE --- */
        body {
            margin: 0; padding: 0;
            background: linear-gradient(-45deg, #0a0a0e, #1c1c2b, #12121a, #0a0a0e);
            background-size: 400% 400%;
            animation: moverFondo 15s ease infinite;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        @keyframes moverFondo {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- VISTA CATÁLOGO (Vista actual en image_5) --- */
        #vista-catalogo { 
            padding: 20px; 
            width: 100%;
            max-width: 1200px; 
            margin: 0 auto;
            box-sizing: border-box;
        }
        
        .header-catalogo {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #222;
            flex-wrap: wrap; gap: 15px;
        }

        .titulo-principal { font-size: 28px; font-weight: 800; color: #0088cc; margin: 0; letter-spacing: 1px; }

        #buscador {
            background: #1a1a1a; border: 1px solid #333; color: white;
            padding: 10px 18px; border-radius: 30px; width: 230px; outline: none;
            transition: 0.3s;
        }

        .grid-animes { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }

        .tarjeta-anime {
            position: relative; border-radius: 10px; overflow: hidden; cursor: pointer;
            aspect-ratio: 2/3; transition: 0.3s ease-out;
            background: #151515;
        }
        .tarjeta-anime:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0, 136, 204, 0.2); }
        .tarjeta-anime img { width: 100%; height: 100%; object-fit: cover; }
        .titulo-tarjeta {
            position: absolute; bottom: 0; width: 100%; padding: 20px 5px 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            font-size: 12px; font-weight: bold; text-align: center; box-sizing: border-box;
        }

        /* --- VISTA DETALLES (Vista actual en image_4) --- */
        #vista-detalles { 
            display: none; min-height: 100vh; position: relative; 
            width: 100%; max-width: 1200px; margin: 0 auto; box-sizing: border-box;
        }

        /* Banner de fondo borroso (recreado) */
        .bg-banner {
            position: absolute; top: 0; left: 0; width: 100vw; 
            height: 500px; 
            z-index: -2; opacity: 0.4; filter: blur(40px); object-fit: cover;
            margin-left: calc(-50vw + 50%);
        }
        
        .layout-detalles {
            display: flex; gap: 30px; 
            max-width: 1100px; margin: 0 auto;
            padding: 20px; align-items: flex-start; box-sizing: border-box;
        }

        .img-lateral {
            flex: 0 0 260px; 
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.08);
            margin-top: 20px;
        }
        .img-lateral img { width: 100%; display: block; }

        .info-derecha { flex: 1; display: flex; flex-direction: column; gap: 10px; position: relative;}
        
        /* Contenedor principal de título y soporte */
        .header-info { display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 5px; flex-wrap: wrap; }
        .titulo-anime { font-size: 36px; margin: 0; font-weight: 800; line-height: 1.1; flex: 1;}

        .soporte-container { display: flex; gap: 10px; align-items: center; }
        .btn-soporte {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
            color: white; padding: 8px 16px; border-radius: 20px;
            font-size: 12px; font-weight: bold; text-transform: uppercase;
            cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(5px); 
        }
        .btn-soporte:hover { background: rgba(255, 255, 255, 0.1); }
        .btn-subs { color: #0088cc; border-color: rgba(0, 136, 204, 0.3); }

        .estado-block { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #888;}
        .punto-rojo { width: 8px; height: 8px; background-color: #ff4444; border-radius: 50%; display: inline-block;}
        .generos { display: flex; gap: 6px; flex-wrap: wrap; }
        .tag { background: #0088cc; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }

        .sinopsis-container {
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(10px);
            border-radius: 12px; border-left: 4px solid #0088cc;
            padding: 18px; margin-bottom: 20px; box-sizing: border-box;
            max-width: 900px;
            line-height: 1.6; color: #ccc; font-size: 14px;
        }
        
        /* --- PANEL DE TEMPORADAS (El cambio crucial) --- */
        .temporadas-panel {
            background: rgba(15, 15, 15, 0.95); padding: 22px; border-radius: 18px;
            width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px;
            border: 1px solid #333; box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        
        .txt-guia { color: #888; font-size: 12px; text-transform: uppercase; text-align: center; margin-bottom: 5px; font-weight: bold;}

        /* Contenedor flexible para los botones */
        .temporadas-botones-container {
            display: flex; gap: 12px; 
            width: 100%; justify-content: center; flex-wrap: wrap;
        }

        .btn-accion {
            background: #0088cc; color: white; border: none; padding: 12px;
            border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 6px;
            flex: 1 1 200px; /* Hace que se estiren pero con un tamaño base */
            max-width: 250px;
        }
        .btn-accion:active { transform: scale(0.97); }

        .icon-claqueta { font-size: 16px; }

        /* Estilos responsivos */
        @media (max-width: 850px) {
            .layout-detalles { flex-direction: column; align-items: center; gap: 15px; padding: 15px; }
            .img-lateral { width: 200px; flex: none; margin-top: 10px; }
            .info-derecha { align-items: center; text-align: center;}
            .header-info { flex-direction: column; align-items: center; gap: 5px; }
            .titulo-anime { font-size: 26px; }
            .soporte-container { margin-top: 10px;}
            .sinopsis-container { text-align: left; font-size: 13px; padding: 15px;}
            .btn-accion { flex: 1 1 100%; max-width: 100%; } /* Apilar botones en móvil */
        }
    </style>
</head>
<body>

    <div id="vista-catalogo">
        <div class="header-catalogo">
            <h1 class="titulo-principal">AKaergsty</h1>
            <input type="text" id="buscador" placeholder="Buscar anime...">
        </div>
        <div class="grid-animes" id="grid">
            <div class="tarjeta-anime" onclick="abrirDetalles('jigokuraku')">
                <img src="https://m.media-amazon.com/images/M/MV5BMjA5ODE4Mjg4NV5BMl5BanBnXkFtZTgwMDUyNTQzMjE@._V1_FMjpg_UX1000_.jpg" alt="Jigokuraku">
                <div class="titulo-tarjeta">Jigokuraku</div>
            </div>
            </div>
    </div>

    <div id="vista-detalles">
        <img id="bg-bluroso" class="bg-banner" src="" alt="">
        <div class="layout-detalles">
            <div class="img-lateral">
                <img id="det-img" src="" alt="">
            </div>
            <div class="info-derecha">
                <div class="header-info">
                    <h1 id="det-titulo" class="titulo-anime"></h1>
                    <div class="soporte-container">
                        <button class="btn-soporte btn-subs">★ Suscripción</button>
                        <button class="btn-soporte">♥ Donar</button>
                    </div>
                </div>
                
                <div id="det-estado" class="estado-block"></div>
                <div id="det-generos" class="generos"></div>
                <div id="det-sinopsis" class="sinopsis-container"></div>

                <div class="centro-botones">
                    <div class="temporadas-panel">
                        <span class="txt-guia">TEMPORADAS</span>
                        <div id="temporadas-botones" class="temporadas-botones-container">
                            <button id="btn-temporada-1" class="btn-accion">
                                <span class="icon-claqueta">🎬</span> Temporada 1
                            </button>
                            <button id="btn-temporada-2" class="btn-accion">
                                <span class="icon-claqueta">🎬</span> Temporada 2
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Muestra u oculta las vistas
        function abrirDetalles(seriesId) {
            // En una app real, buscarías datos por ID. Aquí recreamos la vista.
            if (seriesId === 'jigokuraku') {
                const img = "https://m.media-amazon.com/images/M/MV5BMjA5ODE4Mjg4NV5BMl5BanBnXkFtZTgwMDUyNTQzMjE@._V1_FMjpg_UX1000_.jpg";
                document.getElementById('det-img').src = img;
                document.getElementById('bg-bluroso').src = img;
                document.getElementById('det-titulo').innerText = "Jigokuraku";
                
                document.getElementById('det-estado').innerHTML = `
                    <span class="punto-rojo"></span>
                    Estado: <span style="color:#ff6666; font-weight:800; margin-left:3px;">Finalizado</span>
                `;
                
                document.getElementById('det-generos').innerHTML = `
                    <span class="tag">Acción</span>
                    <span class="tag">Aventura</span>
                    <span class="tag">Fantasía</span>
                `;
                
                document.getElementById('det-sinopsis').innerText = "Gabimaru el Vacío busca el elixir de la inmortalidad en una isla misteriosa.";
                
                // Configura los botones de temporada
                document.getElementById('btn-temporada-1').onclick = () => {
                    // Acción para Temporada 1
                    console.log('Abriendo Temporada 1');
                };
                document.getElementById('btn-temporada-2').onclick = () => {
                    // Acción para la nueva Temporada 2
                    console.log('Abriendo Temporada 2');
                };
            }
            
            document.getElementById('vista-catalogo').style.display = 'none';
            document.getElementById('vista-detalles').style.display = 'block';
            window.scrollTo(0,0);
        }

        // Función para volver al catálogo
        function volverAlCatalogo() {
            document.getElementById('vista-detalles').style.display = 'none';
            document.getElementById('vista-catalogo').style.display = 'block';
        }
    </script>
</body>
</html>
