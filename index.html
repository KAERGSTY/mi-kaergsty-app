<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKaergsty</title>
    <style>
        /* --- BASE --- */
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- CATÁLOGO --- */
        #vista-catalogo { padding: 30px; max-width: 1200px; margin: 0 auto; }
        
        .header-catalogo {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #222;
        }

        .titulo-principal { font-size: 30px; font-weight: 800; color: #0088cc; margin: 0; letter-spacing: 1px; }

        #buscador {
            background: #1a1a1a; border: 1px solid #333; color: white;
            padding: 12px 20px; border-radius: 30px; width: 250px; outline: none;
            transition: 0.3s;
        }
        #buscador:focus { border-color: #0088cc; box-shadow: 0 0 10px rgba(0, 136, 204, 0.2); }

        .grid-animes { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }

        .tarjeta-anime {
            position: relative; border-radius: 12px; overflow: hidden; cursor: pointer;
            aspect-ratio: 2/3; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #151515;
        }
        .tarjeta-anime:hover { transform: translateY(-10px); box-shadow: 0 10px 25px rgba(0, 136, 204, 0.3); }
        .tarjeta-anime img { width: 100%; height: 100%; object-fit: cover; }
        .titulo-tarjeta {
            position: absolute; bottom: 0; width: 100%; padding: 25px 5px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            font-size: 13px; font-weight: bold; text-align: center;
        }

        /* --- VISTA DETALLES (EL DISEÑO QUE TE GUSTÓ) --- */
        #vista-detalles { display: none; min-height: 100vh; position: relative; overflow-x: hidden; }

        /* Banner de fondo sutil */
        .bg-banner {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.2; filter: blur(15px); object-fit: cover;
        }

        .header-detalles { padding: 20px 30px; }
        .btn-atras {
            background: #222; border: none; color: white; padding: 10px 20px;
            border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-atras:hover { background: #0088cc; }

        .layout-detalles {
            display: flex; gap: 40px; max-width: 1000px; margin: 20px auto;
            padding: 0 20px; align-items: flex-start;
        }

        .img-lateral {
            flex: 0 0 300px; border-radius: 15px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); border: 1px solid #333;
        }
        .img-lateral img { width: 100%; display: block; }

        .info-derecha { flex: 1; }
        .titulo-anime { font-size: 38px; margin: 0 0 15px 0; font-weight: 800; }

        .generos { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .tag { background: #0088cc; padding: 4px 14px; border-radius: 15px; font-size: 12px; font-weight: bold; }

        /* Caja de Sinopsis con Degradado */
        .caja-sinopsis {
            background: linear-gradient(145deg, #181818, #0f0f0f);
            padding: 25px; border-radius: 15px; border-left: 4px solid #0088cc;
            line-height: 1.7; color: #ccc; margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Botones Centrados */
        .centro-botones { display: flex; justify-content: center; width: 100%; }
        .caja-botones {
            background: #161616; padding: 25px; border-radius: 20px;
            width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
        }
        .txt-guia { color: #666; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; text-align: center;}

        .btn-accion {
            background: #0088cc; color: white; border: none; padding: 14px;
            border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer;
            transition: 0.3s;
        }
        .btn-accion:hover { background: #006699; transform: scale(1.02); }

        .btn-v { background: none; border: none; color: #ff4444; font-weight: bold; cursor: pointer; margin-top: 5px;}

        /* Celular */
        @media (max-width: 768px) {
            .layout-detalles { flex-direction: column; align-items: center; }
            .img-lateral { width: 220px; flex: none; }
            .titulo-anime { text-align: center; font-size: 28px; }
            .generos { justify-content: center; }
        }
    </style>
</head>
