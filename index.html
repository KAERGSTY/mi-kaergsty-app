<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Anime Profesional</title>
    <style>
        /* --- ESTILOS GENERALES (Tema Oscuro) --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* --- VISTA DEL CATÁLOGO --- */
        #vista-catalogo {
            padding: 20px;
        }
        
        .header-catalogo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }

        .grid-animes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .tarjeta-anime {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 2 / 3;
            /* Aquí está la animación profesional al pasar el mouse */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .tarjeta-anime:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .tarjeta-anime img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .titulo-tarjeta {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px 10px 10px;
            font-size: 14px;
            font-weight: bold;
        }

        /* --- VISTA DE DETALLES (Estilo App) --- */
        #vista-detalles {
            display: none; /* Oculto por defecto */
            min-height: 100vh;
            background-color: #121212;
            padding-bottom: 40px;
        }

        .header-detalles {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            background-color: transparent;
            position: absolute;
            top: 0;
            z-index: 10;
        }

        .btn-atras {
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }

        .btn-atras:hover {
            background: rgba(0,0,0,0.8);
        }

        .banner-detalle {
            width: 100%;
            height: 300px;
            object-fit: cover;
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
        }

        .info-contenedor {
            padding: 0 20px;
            margin-top: -50px;
            position: relative;
            z-index: 5;
        }

        .titulo-detalle {
            font-size: 28px;
            margin: 0 0 10px 0;
        }

        .generos {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .tag-genero {
            border: 1px solid #555;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            color: #ddd;
        }

        .sinopsis {
            font-size: 14px;
            line-height: 1.6;
            color: #bbb;
            margin-bottom: 30px;
        }

        /* --- SECCIÓN DE TEMPORADAS E IDIOMAS --- */
        .seccion-botones {
            background-color: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 400px;
        }

        .titulo-seccion {
            font-size: 16px;
            margin: 0 0 15px 0;
            color: #aaa;
            text-align: center;
        }

        .btn-azul {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn-azul:hover {
            background-color: #006699;
            transform: scale(1.02);
        }

        .btn-volver-temp {
            background-color: transparent;
            color: #ff4444;
            border: none;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 5px;
        }
        
        .btn-volver-temp:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="vista-catalogo">
        <div class="header-catalogo">Mi Biblioteca</div>
        <div class="grid-animes" id="contenedor-grid">
            </div>
    </div>

    <div id="vista-detalles">
        <div class="header-detalles">
            <button class="btn-atras" onclick="cerrarDetalles()">←</button>
        </div>
        <img id="img-detalle" class="banner-detalle" src="" alt="Banner">
        
        <div class="info-contenedor">
            <h1 id="titulo-detalle" class="titulo-detalle"></h1>
            
            <div id="generos-detalle" class="generos">
                </div>
            
            <p id="sinopsis-detalle" class="sinopsis"></p>

            <div class="seccion-botones" id="area-interactiva">
                </div>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS DEL ANIME ---
        // Ahora incluimos imagen, sinopsis, géneros y enlaces en un solo lugar.
        const baseDeDatosAnime = {
            "Jigokuraku": {
                imagen: "https://via.placeholder.com/300x450/222222/ffffff?text=Jigokuraku", 
                banner: "https://via.placeholder.com/800x400/222222/ffffff?text=Jigokuraku",
                sinopsis: "El ninja Gabimaru el Vacío es sentenciado a muerte, pero recibe una oportunidad de ser indultado si viaja a una isla misteriosa y recupera el elixir de la inmortalidad para el shogunato.",
                generos: ["Acción", "Fantasía oscura", "Gore"],
                enlaces: {
                    "Temporada 1": {
                        "Latino": "https://t.me/AnimeKaergsty1/4808",
                        "Japonés": "https://t.me/AnimeKaergsty1/4805"
                    },
                    "Temporada 2": {
                        "Latino": "https://t.me/AnimeKaergsty1/4443",
                        "Japonés": "https://t.me/AnimeKaergsty1/4153"
                    }
                }
            },
            "Kaguya-sama wa Kokurasetai": {
                imagen: "https://via.placeholder.com/300x450/442222/ffffff?text=Kaguya-sama",
                banner: "https://via.placeholder.com/800x400/442222/ffffff?text=Kaguya-sama",
                sinopsis: "En la academia Shuchiin, los líderes del consejo estudiantil Miyuki Shirogane y Kaguya Shinomiya se gustan, pero su orgullo les impide confesarse. Comienza una guerra psicológica para hacer que el otro se declare primero.",
                generos: ["Comedia Romántica", "Escolar", "Psicológico"],
                enlaces: {
                    "Temporada 1": {
                        "Latino": "https://t.me/AnimeKaergsty1/5069",
                        "Japonés": "https://t.me/AnimeKaergsty1/5067"
                    },
                    "Temporada 2": {
                        "Japonés": "https://t.me/AnimeKaergsty1/5071"
                    }
                }
            }
        };

        // --- FUNCIONES DEL SISTEMA ---

        // 1. Generar la cuadrícula del catálogo
        function cargarCatalogo() {
            const contenedor = document.getElementById('contenedor-grid');
            contenedor.innerHTML = ""; // Limpiar

            for (const nombreAnime in baseDeDatosAnime) {
                const anime = baseDeDatosAnime[nombreAnime];
                
                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-anime';
                // Al hacer clic, abre la vista de detalles
                tarjeta.onclick = () => abrirDetalles(nombreAnime);

                tarjeta.innerHTML = `
                    <img src="${anime.imagen}" alt="${nombreAnime}">
                    <div class="titulo-tarjeta">${nombreAnime}</div>
                `;
                
                contenedor.appendChild(tarjeta);
            }
        }

        // 2. Transición a la pantalla de detalles
        function abrirDetalles(nombreAnime) {
            const anime = baseDeDatosAnime[nombreAnime];
            
            // Llenar los datos
            document.getElementById('img-detalle').src = anime.banner || anime.imagen;
            document.getElementById('titulo-detalle').innerText = nombreAnime;
            document.getElementById('sinopsis-detalle').innerText = anime.sinopsis;
            
            // Llenar géneros
            const contenedorGeneros = document.getElementById('generos-detalle');
            contenedorGeneros.innerHTML = "";
            anime.generos.forEach(genero => {
                contenedorGeneros.innerHTML += `<span class="tag-genero">${genero}</span>`;
            });

            // Ocultar catálogo y mostrar detalles
            document.getElementById('vista-catalogo').style.display = 'none';
            document.getElementById('vista-detalles').style.display = 'block';
            
            // Desplazar hacia arriba
            window.scrollTo(0, 0);

            // Cargar los botones de las temporadas
            mostrarTemporadas(nombreAnime);
        }

        // 3. Volver al catálogo
        function cerrarDetalles() {
            document.getElementById('vista-detalles').style.display = 'none';
            document.getElementById('vista-catalogo').style.display = 'block';
        }

        // 4. Mostrar botones de Temporadas
        function mostrarTemporadas(nombreAnime) {
            const areaInteractiva = document.getElementById('area-interactiva');
            const enlaces = baseDeDatosAnime[nombreAnime].enlaces;
            
            areaInteractiva.innerHTML = `<p class="titulo-seccion">Temporadas disponibles</p>`;

            if (enlaces) {
                Object.keys(enlaces).forEach(temp => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-azul';
                    btn.innerText = temp;
                    btn.onclick = () => mostrarIdiomas(nombreAnime, temp);
                    areaInteractiva.appendChild(btn);
                });
            } else {
                areaInteractiva.innerHTML += `<button class="btn-azul" style="background-color: #555;">Próximamente</button>`;
            }
        }

        // 5. Mostrar botones de Idiomas al elegir una temporada
        function mostrarIdiomas(nombreAnime, temporada) {
            const areaInteractiva = document.getElementById('area-interactiva');
            const infoTemp = baseDeDatosAnime[nombreAnime].enlaces[temporada];
            
            areaInteractiva.innerHTML = `<p class="titulo-seccion">${temporada}</p>`;

            Object.keys(infoTemp).forEach(idioma => {
                const btn = document.createElement('button');
                btn.className = 'btn-azul';
                btn.innerText = idioma;
                btn.onclick = () => window.open(infoTemp[idioma], '_blank');
                areaInteractiva.appendChild(btn);
            });

            // Botón para retroceder a la lista de temporadas
            const btnVolver = document.createElement('button');
            btnVolver.className = 'btn-volver-temp';
            btnVolver.innerText = "← Volver a Temporadas";
            btnVolver.onclick = () => mostrarTemporadas(nombreAnime);
            areaInteractiva.appendChild(btnVolver);
        }

        // Iniciar el catálogo al cargar la página
        cargarCatalogo();
    </script>
</body>
</html>
