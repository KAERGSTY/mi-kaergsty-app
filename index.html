<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKaergsty Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- ESTILOS BASE --- */
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* --- VISTA CATÁLOGO --- */
        #vista-catalogo { padding: 30px; max-width: 1200px; margin: 0 auto; }
        
        .header-catalogo {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #222;
        }

        .titulo-principal { font-size: 30px; font-weight: 800; color: #0088cc; margin: 0; letter-spacing: 1px; }

        #buscador {
            background: #1a1a1a; border: 1px solid #333; color: white;
            padding: 12px 20px; border-radius: 30px; width: 250px; outline: none;
            transition: 0.3s;
        }

        .grid-animes { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }

        .tarjeta-anime {
            position: relative; border-radius: 12px; overflow: hidden; cursor: pointer;
            aspect-ratio: 2/3; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #151515;
        }
        .tarjeta-anime:hover { transform: translateY(-10px); box-shadow: 0 10px 25px rgba(0, 136, 204, 0.3); }
        .tarjeta-anime img { width: 100%; height: 100%; object-fit: cover; }
        .titulo-tarjeta {
            position: absolute; bottom: 0; width: 100%; padding: 25px 5px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            font-size: 13px; font-weight: bold; text-align: center;
        }

        /* --- VISTA DETALLES --- */
        #vista-detalles { display: none; min-height: 100vh; position: relative; }

        .bg-banner {
            position: absolute; top: 0; left: 0; width: 100%; height: 700px;
            z-index: -2; opacity: 0.5; filter: blur(50px); object-fit: cover;
        }

        .header-detalles { padding: 20px 30px; }
        .btn-atras {
            background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 20px;
            border-radius: 20px; cursor: pointer; font-weight: bold; backdrop-filter: blur(5px);
        }

        .layout-detalles {
            display: flex; gap: 40px; max-width: 1100px; margin: 20px auto;
            padding: 0 20px; align-items: flex-start;
        }

        .img-lateral {
            flex: 0 0 300px; border-radius: 15px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
        }
        .img-lateral img { width: 100%; display: block; }

        .info-derecha { flex: 1; }
        .titulo-anime { font-size: 40px; margin: 0 0 15px 0; font-weight: 800; }

        .generos { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 25px; }
        .tag { background: #0088cc; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        .caja-sinopsis {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; border-left: 5px solid #0088cc;
            line-height: 1.8; color: #eee; margin-bottom: 40px;
        }

        .centro-botones { display: flex; justify-content: center; width: 100%; }
        .caja-botones {
            background: rgba(20, 20, 20, 0.8); padding: 30px; border-radius: 25px;
            width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 15px;
            border: 1px solid #333;
        }
        .txt-guia { color: #888; font-size: 13px; text-transform: uppercase; text-align: center; }

        .btn-accion {
            background: #0088cc; color: white; border: none; padding: 15px;
            border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer;
        }

        .btn-v { background: none; border: none; color: #ff4444; font-weight: bold; cursor: pointer; margin-top: 5px;}

        @media (max-width: 850px) {
            .layout-detalles { flex-direction: column; align-items: center; }
            .img-lateral { width: 260px; flex: none; }
            .titulo-anime { text-align: center; font-size: 32px; }
        }
    </style>
</head>
<body>

    <div id="vista-catalogo">
        <div class="header-catalogo">
            <h1 class="titulo-principal">AKaergsty</h1>
            <input type="text" id="buscador" placeholder="Buscar anime..." oninput="filtrar()">
        </div>
        <div class="grid-animes" id="grid"></div>
    </div>

    <div id="vista-detalles">
        <img id="bg-bluroso" class="bg-banner" src="" alt="">
        <div class="header-detalles">
            <button class="btn-atras" onclick="cerrar()">← VOLVER AL CATÁLOGO</button>
        </div>
        <div class="layout-detalles">
            <div class="img-lateral">
                <img id="det-img" src="" alt="">
            </div>
            <div class="info-derecha">
                <h1 id="det-titulo" class="titulo-anime"></h1>
                <div id="det-generos" class="generos"></div>
                <div class="caja-sinopsis"><p id="det-sinopsis"></p></div>
                <div class="centro-botones">
                    <div class="caja-botones" id="area-botones"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlBaseGitHub = "https://raw.githubusercontent.com/Kaergsty/mi-kaergsty-app/main/img/";

        const base = {
            "Jigokuraku": {
                sinopsis: "Gabimaru el Vacío busca el elixir de la inmortalidad en una isla misteriosa.",
                generos: ["Acción", "Aventura", "Fantasía"],
                enlaces: { "Temporada 1": { "Latino": "https://t.me/c/123/1", "Japonés": "https://t.me/c/123/2" } }
            },
            "Solo Leveling": {
                sinopsis: "El cazador más débil Sung Jin-woo recibe un extraño sistema para subir de nivel.",
                portada: "https://i.pinimg.com/1200x/5d/4d/90/5d4d90a821211cec21c463b2b94ab56e.jpg",
                generos: ["Acción", "Aventura", "Fantasía"],
                enlaces: { "Temporada 1": { "Latino": "https://t.me/c/123/3" } }
            },
            "Demi chan wa kataritai": {
                sinopsis: "Un profesor de Biología busca comprender a las 'demi', seres que comienzan a ser aceptados en la sociedad.",
                generos: ["Comedia", "Escolares", "Fantasía", "Seinen"],
                enlaces: { "Temporada 1": { "Japonés": "https://t.me/AnimeKaergsty1/4940", "Latino": "https://t.me/AnimeKaergsty1/4943" } }
            }
        };

        function cargar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            for (const nombre in base) {
                const anime = base[nombre];
                const div = document.createElement('div');
                div.className = 'tarjeta-anime';
                div.onclick = () => abrir(nombre);
                
                let imgUrl = anime.portada ? anime.portada : urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
                
                div.innerHTML = `
                    <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/160x240/222/555?text=Error+Img'">
                    <div class="titulo-tarjeta">${nombre}</div>
                `;
                grid.appendChild(div);
            }
        }

        function abrir(nombre) {
            const anime = base[nombre];
            let imgUrl = anime.portada ? anime.portada : urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
            
            // Llenar los campos fijos
            document.getElementById('det-img').src = imgUrl;
            document.getElementById('bg-bluroso').src = imgUrl;
            document.getElementById('det-titulo').innerText = nombre;
            document.getElementById('det-sinopsis').innerText = anime.sinopsis;

            // Generar etiquetas de géneros
            const gens = document.getElementById('det-generos');
            gens.innerHTML = "";
            anime.generos.forEach(g => {
                gens.innerHTML += `<span class="tag">${g}</span>`;
            });

            // Cambiar de vista
            document.getElementById('vista-catalogo').style.display = 'none';
            document.getElementById('vista-detalles').style.display = 'block';
            window.scrollTo(0,0);
            
            // Cargar botones de temporada
            mostrarT(nombre);
        }

        function mostrarT(nombre) {
            const area = document.getElementById('area-botones');
            area.innerHTML = `<span class="txt-guia">Temporadas</span>`;
            Object.keys(base[nombre].enlaces).forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion';
                btn.innerText = t;
                btn.onclick = () => mostrarI(nombre, t);
                area.appendChild(btn);
            });
        }

        function mostrarI(nombre, t) {
            const area = document.getElementById('area-botones');
            const links = base[nombre].enlaces[t];
            area.innerHTML = `<span class="txt-guia">Idiomas - ${t}</span>`;
            Object.keys(links).forEach(idioma => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion';
                btn.innerText = idioma;
                btn.onclick = () => {
                    if (window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.openLink(links[idioma]);
                    } else {
                        window.open(links[idioma], '_blank');
                    }
                };
                area.appendChild(btn);
            });
            const back = document.createElement('button');
            back.className = 'btn-v';
            back.innerText = "← VOLVER";
            back.onclick = () => mostrarT(nombre);
            area.appendChild(back);
        }

        function cerrar() {
            document.getElementById('vista-detalles').style.display = 'none';
            document.getElementById('vista-catalogo').style.display = 'block';
        }

        function filtrar() {
            const v = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.tarjeta-anime').forEach(t => {
                t.style.display = t.innerText.toLowerCase().includes(v) ? 'block' : 'none';
            });
        }

        cargar();
    </script>
</body>
</html>
