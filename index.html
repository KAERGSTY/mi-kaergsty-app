<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeKaergsty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
   <style>
    body { 
        font-family: sans-serif; 
        background: #1a1a1a; 
        color: white; 
        margin: 0; 
        padding-top: 50px; 
    }

    h2 { 
        color: #0088cc; 
        text-align: center;
        margin-bottom: 30px; 
    }

    .grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, 160px); 
        gap: 20px; 
        padding: 20px; 
        justify-content: center; /* Centra el catálogo */
    }

    .card {
        background: #2a2a2a; /* Fondo gris oscuro para la tarjeta */
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s; /* Efectos suaves */
        text-align: center;
        position: relative; /* Para la animación de pulso */
    }

    .card img {
        width: 100%;
        height: 230px;
        object-fit: cover;
        display: block;
    }

    .card:hover {
        transform: translateY(-5px); /* Se levanta un poco */
        box-shadow: 0 10px 20px rgba(0, 136, 204, 0.4); /* Brillo azul sutil */
        animation: pulso 1.5s infinite; /* Animación de pulso infinita */
    }

    .card p {
        font-size: 14px;
        font-weight: bold;
        margin: 10px 5px;
        color: white; /* Texto blanco para buena legibilidad */
    }

    /* Definición de la animación de pulso */
    @keyframes pulso {
        0% {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.4);
        }
        50% {
            transform: translateY(-5px) scale(1);
            box-shadow: 0 5px 10px rgba(0, 136, 204, 0.2);
        }
        100% {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.4);
        }
    }
</style>
</head>
<body>
    <h2>Anime Kaergsty</h2>
    <div class="grid">
        <div class="card" onclick="openAnime('https://t.me/AnimeKaergsty1/5067')">
            <img src="poster01.jpg" alt="Anime 1">
            <p>Kaguya-sama wa Kokurasetai</p>
        </div>

        <div class="card" onclick="openAnime('https://t.me/AnimeKaergsty1/5071')">
            <img src="poster02.jpg" alt="Anime 2">
            <p>Kaguya-sama wa Kokurasetai2</p>
        </div>
        
        </div>
    <script>
        const tg = window.Telegram.WebApp;
    tg.expand();

    function openAnime(url) {
        // Esta función abre el link directamente en Telegram
        tg.openTelegramLink(url);
        
        // Opcional: cierra la Mini App después de abrir el link
        // tg.close(); 
    }
        </script>
</body>
</html>
