<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AKaergsty Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- ESTILOS BASE --- */
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- VISTA CATÁLOGO --- */
        #vista-catalogo { 
            padding: 20px; 
            width: 100%;
            max-width: 1200px; 
            margin: 0 auto;
            box-sizing: border-box;
        }
        
        .header-catalogo {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #222;
            flex-wrap: wrap; gap: 15px;
        }

        .titulo-principal { font-size: 28px; font-weight: 800; color: #0088cc; margin: 0; letter-spacing: 1px; }

        #buscador {
            background: #1a1a1a; border: 1px solid #333; color: white;
            padding: 10px 18px; border-radius: 30px; width: 230px; outline: none;
            transition: 0.3s;
        }

        .grid-animes { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }

        .tarjeta-anime {
            position: relative; border-radius: 10px; overflow: hidden; cursor: pointer;
            aspect-ratio: 2/3; transition: 0.3s ease-out;
            background: #151515;
        }
        .tarjeta-anime:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0, 136, 204, 0.2); }
        .tarjeta-anime img { width: 100%; height: 100%; object-fit: cover; }
        .titulo-tarjeta {
            position: absolute; bottom: 0; width: 100%; padding: 20px 5px 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            font-size: 12px; font-weight: bold; text-align: center; box-sizing: border-box;
        }

        /* --- VISTA DETALLES (OPTIMIZADA) --- */
        #vista-detalles { 
            display: none; min-height: 100vh; position: relative; 
            width: 100%; max-width: 1200px; margin: 0 auto; box-sizing: border-box;
            padding-bottom: 40px; 
        }

        .bg-banner {
            position: absolute; top: 0; left: 0; width: 100vw; 
            height: 500px; 
            z-index: -2; opacity: 0.4; filter: blur(40px); object-fit: cover;
            margin-left: calc(-50vw + 50%);
        }
        
        .layout-detalles {
            display: flex; gap: 30px; 
            max-width: 1100px; margin: 0 auto;
            padding: 20px; align-items: flex-start; box-sizing: border-box;
        }

        .img-lateral {
            flex: 0 0 260px; 
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.08);
            margin-top: 20px;
        }
        .img-lateral img { width: 100%; display: block; }

        .info-derecha { flex: 1; display: flex; flex-direction: column; gap: 8px; position: relative;}
        
        /* Contenedor principal de título y soporte para alinearlos */
        .header-info { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 5px; flex-wrap: wrap; }
        .titulo-anime { font-size: 36px; margin: 0; font-weight: 800; line-height: 1.1; flex: 1;}

        /* --- ESTILOS DE ESTADO Y PUNTOS ANIMADOS --- */
        .estado-container {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; font-weight: 600; color: #888;
            margin-top: -5px; 
        }
        
        .punto {
            width: 9px; height: 9px; border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 5px rgba(255,255,255,0.2);
            animation: pulsoPunto 1.5s infinite ease-in-out;
        }
        
        .punto-rojo { background-color: #ff4444; }
        .punto-rojo { animation-name: pulsoRojo; }
        @keyframes pulsoRojo {
            0% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 0 5px rgba(255, 68, 68, 0); }
            100% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }

        .punto-verde { background-color: #00cc66; }
        .punto-verde { animation-name: pulsoVerde; }
        @keyframes pulsoVerde {
            0% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 204, 102, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 0 5px rgba(0, 204, 102, 0); }
            100% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 204, 102, 0); }
        }

        .txt-finalizado { color: #ff6666; }
        .txt-emision { color: #00ff88; }

        /* --- ESTILOS DE SOPORTE "CAMUFLADOS" --- */
        .soporte-container {
            display: flex; gap: 10px; align-items: center;
            margin-top: 5px; 
        }
        
        .btn-soporte {
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            color: #777; 
            padding: 8px 16px; border-radius: 20px;
            font-size: 12px; font-weight: bold; text-transform: uppercase;
            cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(5px); 
            display: flex; align-items: center; gap: 6px;
        }
        
        .btn-soporte:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.05);
        }

        .btn-subs {
            color: #0088cc;
            border-color: rgba(0, 136, 204, 0.2);
            animation: pulsoBordeSubs 2s infinite;
        }
        .btn-subs:hover {
            color: #fff;
            background: rgba(0, 136, 204, 0.1);
            border-color: rgba(0, 136, 204, 0.4);
        }

        @keyframes pulsoBordeSubs {
            0% { box-shadow: 0 0 0 0 rgba(0, 136, 204, 0.1); border-color: rgba(0, 136, 204, 0.2); }
            50% { box-shadow: 0 0 0 4px rgba(0, 136, 204, 0); border-color: rgba(0, 136, 204, 0.4); }
            100% { box-shadow: 0 0 0 0 rgba(0, 136, 204, 0); border-color: rgba(0, 136, 204, 0.2); }
        }

        /* --- NUEVOS ESTILOS PARA NOMBRES OPCIONALES --- */
        .nombres-opcionales {
            display: flex; flex-direction: column; gap: 4px;
            margin-top: 5px; margin-bottom: 12px;
        }
        .tag-idioma {
            font-size: 12px; color: #aaa; background: rgba(255,255,255,0.04);
            padding: 4px 10px; border-radius: 6px; display: inline-block;
            font-style: italic; border: 1px solid rgba(255,255,255,0.03);
        }

        .generos { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
        .tag { background: #0088cc; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }

        /* --- CAJA DE SINOPSIS Y ACCIONES INTEGRADAS --- */
        .contenedor-sinopsis-acciones {
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(10px);
            border-radius: 12px; border-left: 4px solid #0088cc;
            margin-bottom: 20px; box-sizing: border-box;
            overflow: hidden; /* Importante para los bordes */
        }

        .caja-sinopsis {
            padding: 18px 18px 10px; /* Reducido padding inferior */
            line-height: 1.6; color: #ccc; font-size: 14px;
        }
        .caja-sinopsis p { margin: 0; }

        /* --- NUEVA BARRA DE ACCIONES (INTERACTIVA) --- */
        .barra-acciones {
            display: flex; gap: 10px; padding: 10px 18px 15px; 
            border-top: 1px solid rgba(255,255,255,0.03);
            flex-wrap: wrap;
        }

        /* Estilo general de los botones de acción */
        .btn-accion-integra {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            color: #aaa;
            padding: 7px 15px; border-radius: 10px;
            font-size: 12px; font-weight: bold;
            cursor: pointer; transition: 0.2s ease;
            display: flex; align-items: center; gap: 6px;
        }
        
        .btn-accion-integra:hover {
            background: rgba(255,255,255,0.06);
            color: #fff;
            border-color: rgba(255,255,255,0.1);
        }

        /* --- ESTILOS DE "LIKE" (VERDE AL PRESIONAR) --- */
        .btn-accion-integra.active-like {
            background: rgba(0, 204, 102, 0.1);
            border-color: rgba(0, 204, 102, 0.3);
            color: #00cc66;
            box-shadow: 0 0 10px rgba(0, 204, 102, 0.1);
        }

        /* --- ESTILOS DE "DISLIKE" (ROJO AL PRESIONAR) --- */
        .btn-accion-integra.active-dislike {
            background: rgba(255, 68, 68, 0.1);
            border-color: rgba(255, 68, 68, 0.3);
            color: #ff4444;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.1);
        }

        /* --- ESTILOS DE ESTADO DE VISUALIZACIÓN --- */
        .btn-accion-integra.status-visto {
            background: rgba(0, 136, 204, 0.1);
            border-color: rgba(0, 136, 204, 0.3);
            color: #0088cc;
        }

        .btn-accion-integra.status-espera {
            background: rgba(255, 204, 0, 0.05);
            border-color: rgba(255, 204, 0, 0.2);
            color: #ffcc00;
        }

        /* Íconos SVG simples para Like/Dislike/Visto */
        .icono { width: 14px; height: 14px; display: inline-block; fill: currentColor; }

        .centro-botones { display: flex; justify-content: center; width: 100%; }
        .caja-botones {
            background: rgba(15, 15, 15, 0.95); padding: 22px; border-radius: 18px;
            width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 10px;
            border: 1px solid #333; box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .txt-guia { color: #888; font-size: 11px; text-transform: uppercase; text-align: center; margin-bottom: 5px;}

        .btn-accion {
            background: #0088cc; color: white; border: none; padding: 12px;
            border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .btn-accion:active { transform: scale(0.97); }

        .btn-v { background: none; border: none; color: #ff4444; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 12px;}

        @media (max-width: 850px) {
            .layout-detalles { flex-direction: column; align-items: center; gap: 15px; padding: 15px; }
            .img-lateral { width: 200px; flex: none; margin-top: 10px; }
            .info-derecha { align-items: center; text-align: center; width: 100%;}
            .header-info { flex-direction: column; align-items: center; gap: 5px; width: 100%; }
            .titulo-anime { font-size: 26px; text-align: center; width: 100%;}
            .estado-container { justify-content: center; margin-top: 2px;}
            .soporte-container { justify-content: center; margin-top: 10px; width: 100%;}
            .btn-soporte { padding: 6px 12px; font-size: 10px; }
            .generos { justify-content: center; }
            .barra-acciones { justify-content: center; padding-left: 10px; padding-right: 10px;}
            .btn-accion-integra { padding: 6px 12px; font-size: 11px; }
            .caja-sinopsis { text-align: left; font-size: 13px; padding: 15px;}
        }
    </style>
</head>
<body>

    <div class="controles-app" style="display: none;"></div>

    <div id="vista-catalogo">
        <div class="header-catalogo">
            <h1 class="titulo-principal">AKaergsty</h1>
            <input type="text" id="buscador" placeholder="Buscar anime..." oninput="filtrar()">
        </div>
        <div class="grid-animes" id="grid"></div>
    </div>

    <div id="vista-detalles">
        <img id="bg-bluroso" class="bg-banner" src="" alt="">
        <div class="layout-detalles">
            <div class="img-lateral">
                <img id="det-img" src="" alt="">
            </div>
            <div class="info-derecha">
                <div class="header-info">
                    <h1 id="det-titulo" class="titulo-anime"></h1>
                    <div id="det-soporte" class="soporte-container"></div>
                </div>
                
                <div id="det-nombres-opcionales" class="nombres-opcionales"></div>

                <div id="det-estado" class="estado-container"></div>
                <div id="det-generos" class="generos"></div>

                <div class="contenedor-sinopsis-acciones">
                    <div class="caja-sinopsis"><p id="det-sinopsis"></p></div>
                    
                    <div id="barra-acciones" class="barra-acciones"></div>
                </div>

                <div class="centro-botones">
                    <div class="caja-botones" id="area-botones"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        tg.BackButton.onClick(() => {
            volverAlCatalogo();
        });

        const urlBaseGitHub = "https://raw.githubusercontent.com/Kaergsty/mi-kaergsty-app/main/img/";

        // --- BASE DE DATOS ACTUALIZADA CON NOMBRES OPCIONALES ---
        const base = {
            "Jigokuraku": {
                // NUEVO: AGREGADOS NOMBRES ALTERNATIVOS
                nombresAlternativos: { 
                    "Japonés": "地獄楽", 
                    "Inglés": "Hell's Paradise: Jigokuraku" 
                },
                sinopsis: "Gabimaru el Vacío busca el elixir de la inmortalidad en una isla misteriosa.",
                generos: ["Acción", "Aventura", "Fantasía"],
                estado: "Finalizado",
                enlaces: { "Temporada 1": { "Latino": "https://t.me/c/123/1", "Japonés": "https://t.me/c/123/2" } }
            },
            "Solo Leveling": {
                // NUEVO: AGREGADOS NOMBRES ALTERNATIVOS
                nombresAlternativos: { 
                    "Japonés": "俺だけレベルアップな件", 
                    "Coreano": "나 혼자만 레벨업" 
                },
                sinopsis: "El cazador más débil Sung Jin-woo recibe un extraño sistema para subir de nivel.",
                portada: "https://m.media-amazon.com/images/M/MV5BM2M4YzdkMTEtMjUyYy00ZWY0LWI5ODQtNGRkZWQ1MzU5MWM2XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg",
                generos: ["Acción", "Aventura", "Fantasía"],
                estado: "Finalizado",
                enlaces: { "Temporada 1": { "Latino": "https://t.me/c/123/3" } }
            },
            "Demi chan wa kataritai": {
                nombresAlternativos: { 
                    "Japonés": "亜人ちゃんは語りたい", 
                    "Inglés": "Interviews with Monster Girls" 
                },
                sinopsis: "Un profesor de Biología busca comprender a las 'demi', seres que comienzan a ser aceptados en la sociedad.",
                generos: ["Comedia", "Escolares", "Fantasía", "Seinen"],
                estado: "Finalizado",
                enlaces: { "Temporada 1": { "Japonés": "https://t.me/AnimeKaergsty1/4940", "Latino": "https://t.me/AnimeKaergsty1/4943" } }
            },
            "One Piece": {
                sinopsis: "Luffy y su tripulación buscan el legendario tesoro One Piece.",
                generos: ["Acción", "Aventura", "Comedia", "Shonen"],
                estado: "En Emisión",
                portada: "https://m.media-amazon.com/images/M/MV5BMTNjNGU4NTUtYzc5Ni00MDk5LTk4ODAtZDIzMGY1N2RkMjk4XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg",
                enlaces: { "Wano Arc": { "Japonés": "#", "Latino": "#" } }
            }
        };

        // --- LÓGICA DE ALMACENAMIENTO LOCAL (MEMORIA) ---
        const MEMORIA_KEY = "AKaergsty_UserDB";
        let userDB = JSON.parse(localStorage.getItem(MEMORIA_KEY)) || {};

        function guardarDB() {
            localStorage.setItem(MEMORIA_KEY, JSON.stringify(userDB));
        }

        // --- INICIALIZACIÓN ---
        function cargar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            for (const nombre in base) {
                const anime = base[nombre];
                const div = document.createElement('div');
                div.className = 'tarjeta-anime';
                div.onclick = () => abrir(nombre);
                
                let imgUrl = anime.portada ? anime.portada : urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
                
                div.innerHTML = `
                    <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150x225/222/555?text=Error+Img'">
                    <div class="titulo-tarjeta">${nombre}</div>
                `;
                grid.appendChild(div);
            }
            tg.BackButton.hide();
        }

        function abrir(nombre) {
            const anime = base[nombre];
            let imgUrl = anime.portada ? anime.portada : urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
            
            document.getElementById('det-img').src = imgUrl;
            document.getElementById('bg-bluroso').src = imgUrl;
            document.getElementById('det-titulo').innerText = nombre;
            document.getElementById('det-sinopsis').innerText = anime.sinopsis;

            // --- LÓGICA PARA NOMBRES OPCIONALES ---
            const nomCont = document.getElementById('det-nombres-opcionales');
            nomCont.innerHTML = "";
            if (anime.nombresAlternativos) {
                for (const lang in anime.nombresAlternativos) {
                    const tag = document.createElement('span');
                    tag.className = 'tag-idioma';
                    tag.innerHTML = `${lang}: ${anime.nombresAlternativos[lang]}`;
                    nomCont.appendChild(tag);
                }
            }

            // --- LÓGICA PARA BOTONES DE SOPORTE (YA ESTABA) ---
            const sopCont = document.getElementById('det-soporte');
            const urlSuscripcion = "https://t.me/YourBotSupport"; 
            const urlDonacion = "https://www.patreon.com/YourPage";
            sopCont.innerHTML = `
                <button class="btn-soporte btn-subs" onclick="abrirSoporte('${urlSuscripcion}')">★ Suscripción</button>
                <button class="btn-soporte" onclick="abrirSoporte('${urlDonacion}')">♥ Donar</button>
            `;

            // Estado Animado (YA ESTABA)
            const estCont = document.getElementById('det-estado');
            let puntoClase = "punto-rojo", textoClase = "txt-finalizado";
            if (anime.estado === "En Emisión") { puntoClase = "punto-verde"; textoClase = "txt-emision"; }
            estCont.innerHTML = `<span>Estado:</span><span class="punto ${puntoClase}"></span><span class="${textoClase}">${anime.estado}</span>`;

            // Géneros (YA ESTABA)
            const gens = document.getElementById('det-generos');
            gens.innerHTML = "";
            anime.generos.forEach(g => { gens.innerHTML += `<span class="tag">${g}</span>`; });

            // --- NUEVA LÓGICA DE ACCIONES INTERACTIVAS (CON MEMORIA) ---
            if (!userDB[nombre]) {
                userDB[nombre] = { like: 0, dislikes: 0, status: "Ninguno" }; // Status: Ninguno, Visto, Espera
            }
            actualizarBarraAcciones(nombre);

            document.getElementById('vista-catalogo').style.display = 'none';
            document.getElementById('vista-detalles').style.display = 'block';
            window.scrollTo(0,0);
            
            mostrarT(nombre);
            tg.BackButton.show();
        }

        // --- ACTUALIZAR LA BARRA DE ACCIONES CON LOS DATOS DE MEMORIA ---
        function actualizarBarraAcciones(nombre) {
            const area = document.getElementById('barra-acciones');
            const datos = userDB[nombre];

            // Íconos SVG simples para Like/Dislike/Visto
            const svgs = {
                like: `<svg class="icono" viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"></path></svg>`,
                dislike: `<svg class="icono" viewBox="0 0 24 24"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"></path></svg>`,
                visto: `<svg class="icono" viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"></path></svg>`
            };

            const clasesStatus = {
                "Ninguno": "",
                "Visto": "status-visto",
                "Espera": "status-espera"
            };

            const textosStatus = {
                "Ninguno": "Status",
                "Visto": "Visto",
                "Espera": "En Espera"
            };

            // HTML de los botones
            area.innerHTML = `
                <button class="btn-accion-integra ${datos.like ? 'active-like' : ''}" onclick="toggleLike('${nombre}')">
                    ${svgs.like} <span id="txt-like">${datos.like ? 'Like' : 'Me gusta'}</span>
                </button>

                <button class="btn-accion-integra ${datos.dislike ? 'active-dislike' : ''}" onclick="toggleDislike('${nombre}')">
                    ${svgs.dislike} <span id="txt-dislike">${datos.dislike ? 'Dislike' : 'No me gusta'}</span>
                </button>

                <button id="btn-status" class="btn-accion-integra ${clasesStatus[datos.status]}" onclick="toggleMenuStatus('${nombre}')">
                    ${datos.status === 'Visto' ? svgs.visto : '⊙'} 
                    <span id="txt-status">${textosStatus[datos.status]}</span>
                </button>
            `;
        }

        // --- FUNCIONES DE INTERACCIÓN (TOGGLE) ---
        function toggleLike(nombre) {
            userDB[nombre].like = userDB[nombre].like ? 0 : 1; // Si tiene like, lo quita. Si no, lo pone.
            if (userDB[nombre].like) userDB[nombre].dislike = 0; // Quita dislike si pone like
            guardarDB();
            actualizarBarraAcciones(nombre);
        }

        function toggleDislike(nombre) {
            userDB[nombre].dislike = userDB[nombre].dislike ? 0 : 1; 
            if (userDB[nombre].dislike) userDB[nombre].like = 0; // Quita like si pone dislike
            guardarDB();
            actualizarBarraAcciones(nombre);
        }

        // --- LÓGICA DE ESTADO (VISTO, ESPERA) USANDO EL MENÚ DE TELEGRAM ---
        function toggleMenuStatus(nombre) {
            const statusActual = userDB[nombre].status;
            
            // Definimos las opciones del menú de Telegram
            let opciones = [
                { id: "visto", title: "Marcar como Visto", value: "Visto" },
                { id: "espera", title: "Añadir a En Espera", value: "Espera" }
            ];

            // Si ya tiene un estado, cambiamos las opciones para que pueda quitarlo
            if (statusActual === "Visto") {
                opciones = [{ id: "quitar_visto", title: "Quitar de Visto", value: "Ninguno" }, { id: "espera", title: "Cambiar a En Espera", value: "Espera" }];
            } else if (statusActual === "Espera") {
                opciones = [{ id: "quitar_espera", title: "Quitar de En Espera", value: "Ninguno" }, { id: "visto", title: "Cambiar a Visto", value: "Visto" }];
            }

            // Muestra el menú de acciones nativo de Telegram
            tg.showActionSheet({
                title: "Seleccionar Estado de Visualización",
                buttons: opciones
            }, (btnId) => {
                // Función CALLBACK que se ejecuta cuando el usuario presiona un botón del menú
                if (!btnId) return; // Si cierra el menú sin presionar nada

                const opcionSeleccionada = opciones.find(opt => opt.id === btnId);
                if (opcionSeleccionada) {
                    userDB[nombre].status = opcionSeleccionada.value; // Guardamos el nuevo estado (Visto, Espera o Ninguno)
                    guardarDB();
                    actualizarBarraAcciones(nombre);
                }
            });
        }

        // --- RESTO DE FUNCIONES (YA ESTABAN, NO TOCAR) ---
        function abrirSoporte(url) { if (tg && tg.openLink) { tg.openLink(url); } else { window.open(url, '_blank'); } }

        function volverAlCatalogo() {
            document.getElementById('vista-detalles').style.display = 'none';
            document.getElementById('vista-catalogo').style.display = 'block';
            tg.BackButton.hide();
        }

        function mostrarT(nombre) {
            const area = document.getElementById('area-botones');
            area.innerHTML = `<span class="txt-guia">Temporadas</span>`;
            Object.keys(base[nombre].enlaces).forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion';
                btn.innerText = t;
                btn.onclick = () => mostrarI(nombre, t);
                area.appendChild(btn);
            });
        }

        function mostrarI(nombre, t) {
            const area = document.getElementById('area-botones');
            const links = base[nombre].enlaces[t];
            area.innerHTML = `<span class="txt-guia">Idiomas - ${t}</span>`;
            Object.keys(links).forEach(idioma => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion';
                btn.innerText = idioma;
                btn.onclick = () => { if (window.Telegram && window.Telegram.WebApp) { window.Telegram.WebApp.openLink(links[idioma]); } else { window.open(links[idioma], '_blank'); } };
                area.appendChild(btn);
            });
            const back = document.createElement('button');
            back.className = 'btn-v';
            back.innerText = "← VOLVER A TEMPORADAS";
            back.onclick = () => mostrarT(nombre);
            area.appendChild(back);
        }

        function filtrar() {
            const v = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.tarjeta-anime').forEach(t => { t.style.display = t.innerText.toLowerCase().includes(v) ? 'block' : 'none'; });
        }

        cargar();
    </script>
</body>
</html>
