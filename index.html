<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeKaergsty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background: #1a1a1a; 
            color: white; 
            margin: 0; 
            padding-top: 20px; 
        }

        h2 { color: #0088cc; text-align: center; margin-bottom: 20px; }

        /* --- NUEVO: DISEÑO DEL BUSCADOR --- */
        .search-container {
            text-align: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        #buscador {
            width: 100%;
            max-width: 350px; /* Tamaño máximo de la barra */
            padding: 12px 20px;
            border-radius: 25px; /* Bordes redondeados elegantes */
            border: 2px solid #2a2a2a;
            background: #1c1c1c;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        /* Cuando tocas la barra de búsqueda, se ilumina en azul */
        #buscador:focus {
            border-color: #0088cc;
            box-shadow: 0 0 10px rgba(0, 136, 204, 0.3);
        }
        /* ---------------------------------- */

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, 160px); 
            gap: 20px; 
            padding: 20px; 
            justify-content: center; 
        }

        .card {
            width: 160px;
            height: 310px; 
            perspective: 1000px; 
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            background: #2a2a2a;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-front img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .card-front p {
            font-size: 14px;
            font-weight: bold;
            margin: 10px;
            text-align: center;
        }

        .card-back {
            transform: rotateY(180deg);
            background: #1c1c1c;
            border: 2px solid #0088cc;
            padding: 15px 10px;
            box-sizing: border-box;
            justify-content: flex-start; 
            overflow-y: auto; 
        }

        .card-back::-webkit-scrollbar { width: 6px; }
        .card-back::-webkit-scrollbar-track { background: #1c1c1c; border-radius: 10px; }
        .card-back::-webkit-scrollbar-thumb { background: #0088cc; border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.4s ease forwards; }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .btn-opcion {
            background: #0088cc;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0; 
        }

        .btn-opcion:active { background: #005f8d; }
    </style>
</head>
<body>

    <h2>Anime Kaergsty</h2>

    <div class="search-container">
        <input type="text" id="buscador" placeholder="Buscar anime..." oninput="filtrarAnimes()">
    </div>

    <div class="grid" id="catalogo"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

// --- AQUÍ ESTÁ TU LISTA DE ANIMES (Fácil de editar) ---
const listaAnimes = [
    "Kaguya-sama wa Kokurasetai",
    "29 sai Dokushin Chuuken Boukensha no Nichijou",
    "Akuyaku Reijou wa Ringoku no Outaishi ni Dekiai sareru",
    "Android wa Keiken Ninzuu ni Hairimasu ka",
    "Arne no Jikenbo",
    "Champignon no Majo",
    "Dark Moon Tsuki no Saidan",
    "Darwin Jihen",
    "Dead Account",
    "Demi_chan_wa_kataritai",
    "Eris no Seihai",
    "Gaikotsu Kishi sama Tadaima Isekai e Odekakechuu",
    "Goumon Baito-kun no Nichijou",
    "Hanazakari no Kimitachi e",
    "Hell Mode Yarikomizuki no Gamer wa Hai Settei no Isekai de Musou suru",
    "Hikuidori_Ushuu_Boro_Tobi_gumi",
    "Ikoku Nikki",
    "Isekai no Sata wa Shachiku Shidai",
    "Jigokuraku",
    "Jingai Kyoushitsu no Ningengirai Kyoushi",
    "Kaya chan wa Kowakunai",
    "Kirei ni Shitemoraemasu ka",
    "Kizoku Tensei Megumareta Umare kara Saikyou no Chikara wo Eru",
    "Majutsushi Kunon wa Mieteiru",
    "Maou no Musume wa Yasashisugiru!!",
    "Mayonaka Heart Tune",
    "Odayaka Kizoku no Kyuuka no Susume",
    "Okashi na Tensei",
    "Okiraku Ryoushu no Tanoshii Ryouchi Bouei",
    "Omagoto",
    "Osananajimi to wa Love Comedy ni Naranai",
    "Seihantai na Kimi to Boku",
    "Shibou Yuugi de Meshi wo Kuu",
    "Tamon kun Ima Docchi",
    "Tensei shitara Dragon no Tamago datta",
    "Toumei Otoko to Ningen Onna Sonouchi Fuufu ni Naru Futari",
    "Uruwashi no Yoi no Tsuki",
    "Yuusha Party ni Kawaii Ko ga Ita node, Kokuhaku shitemita",
    "Yuusha Party wo Oidasareta Kiyoubinbou",
    "Yuusha kei ni Shosu Choubatsu Yuusha 9004 tai Keimu Kiroku",
    "Yuusha no Kuzu"
];

// Aquí pondrás tus links de Telegram cuando los tengas
const enlacesAnime = {
    "Jigokuraku": {
        "Temporada 1": {
            "Español": "https://t.me/AnimeKaergsty1/4808",
            "Japonés": "https://t.me/AnimeKaergsty1/4805"
        }
    // El sistema buscará aquí por el nombre del anime
};
function mostrarTemporadas(id, nombre) {
    const back = document.getElementById('back-' + id);
    const info = enlacesAnime[nombre];

    if (!info) {
        // Si no tienes links, muestra el botón de próximamente como en tu diseño
        back.innerHTML = `
            <div class="btn-container">
                <p class="titulo-back">${nombre}</p>
                <button class="btn-proximamente">Próximamente</button>
                <button class="btn-cerrar" onclick="cerrarCard('${id}')">CERRAR</button>
            </div>`;
    } else {
        // Genera un botón por cada temporada que escribiste arriba
        let botones = "";
        for (let temp in info) {
            botones += `<button class="btn-opcion" onclick="mostrarIdiomas('${id}', '${nombre}', '${temp}')">${temp}</button>`;
        }
        
        back.innerHTML = `
            <div class="btn-container">
                <p class="titulo-back">Temporadas</p>
                ${botones}
                <button class="btn-cerrar" onclick="cerrarCard('${id}')">[ CERRAR ]</button>
            </div>`;
    }
    document.getElementById(id).classList.add('flipped');
}

function mostrarIdiomas(id, nombre, temporada) {
    const back = document.getElementById('back-' + id);
    const idiomas = enlacesAnime[nombre][temporada];

    let botones = "";
    for (let lang in idiomas) {
        // Abre el link directamente en Telegram
        botones += `<button class="btn-opcion" onclick="window.Telegram.WebApp.openTelegramLink('${idiomas[lang]}')">${lang}</button>`;
    }

    back.innerHTML = `
        <div class="btn-container">
            <p class="titulo-back">${temporada}</p>
            ${botones}
            <button class="btn-volver" onclick="mostrarTemporadas('${id}', '${nombre}')">← Volver</button>
        </div>`;
}

function cerrarCard(id) {
    document.getElementById(id).classList.remove('flipped');
}        
// --- FUNCIÓN QUE CREA LAS TARJETAS SOLA ---
function generarCatalogo() {
    const contenedor = document.getElementById('catalogo');
    
    listaAnimes.forEach((nombre, index) => {
        const id = `anime${index}`;
        const nombreLimpio = nombre.replace(/_/g, ' '); // Quita los guiones bajos para el título

        const cardHTML = `
            <div class="card" id="${id}">
                <div class="card-inner">
                    <div class="card-front" onclick="mostrarOpciones('${id}', '${nombre}')">
                        <img src="img/${nombre}.webp" alt="${nombreLimpio}">
                        <p class="titulo-anime">${nombreLimpio}</p>
                    </div>
                    <div class="card-back" id="back-${id}"></div>
                </div>
            </div>
        `;
        contenedor.innerHTML += cardHTML;
    });
}

// Llamamos a la función al abrir la app
generarCatalogo();

// --- LÓGICA DE INTERACCIÓN ---
let idAbierto = null;

function mostrarOpciones(id, nombreReal) {
    if (idAbierto && idAbierto !== id) cerrarCard(idAbierto);
    
    const back = document.getElementById('back-' + id);
    const opciones = enlacesAnime[nombreReal] || { "Próximamente": "#" };

    let html = `<div class="btn-container fade-in">
                    <p style="font-size:12px; color:#aaa;">${nombreReal}</p>`;
    
    for (let key in opciones) {
        html += `<button class="btn-opcion" onclick="tg.openTelegramLink('${opciones[key]}')">${key}</button>`;
    }
    
    html += `<button class="btn-opcion" style="background:#cc0000;" onclick="cerrarCard('${id}')">CERRAR</button>
                </div>`;
    
    back.innerHTML = html;
    document.getElementById(id).classList.add('flipped');
    idAbierto = id;
}

function cerrarCard(id) {
    document.getElementById(id).classList.remove('flipped');
    idAbierto = null;
}

function filtrarAnimes() {
    const texto = document.getElementById('buscador').value.toLowerCase();
    const tarjetas = document.querySelectorAll('.card');
    tarjetas.forEach(t => {
        const titulo = t.querySelector('.titulo-anime').innerText.toLowerCase();
        t.style.display = titulo.includes(texto) ? "block" : "none";
    });
}
    </script>
</body>
</html>
