<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeKaergsty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background: #1a1a1a; 
            color: white; 
            margin: 0; 
            padding-top: 80px; /* Esto baja todo para evitar el botón Cerrar */
        }

        h2 { 
            color: #0088cc; 
            margin-top: -35px;  /* Aumenta este número para bajar el título */
            padding-left: 100px; /* Aumenta este número para moverlo a la derecha */
            margin-bottom: 20px; 
        }

        .grid { 
            display: grid; 
            /* Crea columnas de 160px que empiezan desde la izquierda */
            grid-template-columns: repeat(auto-fill, 160px); 
            gap: 20px; 
            padding: 0 20px; 
            justify-content: start; 
        }

        .card {
    cursor: pointer; /* Muestra el cursor de mano al pasar por encima */
    transition: transform 0.2s, box-shadow 0.2s; /* Efecto suave para las animaciones */
}

/* Efecto visual al pasar el mouse (hover) o tocar la tarjeta */
.card:hover {
    transform: translateY(-5px); /* Levanta ligeramente la tarjeta */
    box-shadow: 0 10px 20px rgba(0,0,0,0.3); /* Aumenta la sombra para dar profundidad */
}

/* Mejora el estilo del texto (el <p>) */
.card p {
    font-size: 16px; /* Ajusta el tamaño de fuente si es necesario */
    font-weight: bold; /* Hace el texto en negrita */
    margin: 10px 10px; /* Añade un poco de margen */
    color: #333; /* Color de texto más oscuro (o el que prefieras) */
}
    </style>
</head>
<body>
    <h2>Anime Kaergsty</h2>
    <div class="grid">
        <div class="card" onclick="sendVideo('ep01')">
            <img src="poster01.jpg" alt="Anime 1">
            <p>Kaguya-sama wa Kokurasetai</p>
        </div>

        <div class="card" onclick="sendVideo('ep02')">
            <img src="poster02.jpg" alt="Anime 2">
            <p>Kaguya-sama wa Kokurasetai2</p>
        </div>
        
        </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function sendVideo(id) {
            tg.sendData(id);
            tg.close();
        }
</body>
</html>
