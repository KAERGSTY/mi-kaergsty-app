<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeKaergsty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background: #1a1a1a; 
            color: white; 
            margin: 0; 
            padding-top: 20px; 
        }

        h2 { color: #0088cc; text-align: center; margin-bottom: 20px; }

        /* --- NUEVO: DISEÑO DEL BUSCADOR --- */
        .search-container {
            text-align: center;
            margin-bottom: 20px;
            padding: 0 20px;
        }

        #buscador {
            width: 100%;
            max-width: 350px; /* Tamaño máximo de la barra */
            padding: 12px 20px;
            border-radius: 25px; /* Bordes redondeados elegantes */
            border: 2px solid #2a2a2a;
            background: #1c1c1c;
            color: white;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        /* Cuando tocas la barra de búsqueda, se ilumina en azul */
        #buscador:focus {
            border-color: #0088cc;
            box-shadow: 0 0 10px rgba(0, 136, 204, 0.3);
        }
        /* ---------------------------------- */

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, 160px); 
            gap: 20px; 
            padding: 20px; 
            justify-content: center; 
        }

        .card {
            width: 160px;
            height: 310px; 
            perspective: 1000px; 
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 12px;
            background: #2a2a2a;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-front img {
            width: 100%;
            height: 230px;
            object-fit: cover;
        }

        .card-front p {
            font-size: 14px;
            font-weight: bold;
            margin: 10px;
            text-align: center;
        }

        .card-back {
            transform: rotateY(180deg);
            background: #1c1c1c;
            border: 2px solid #0088cc;
            padding: 15px 10px;
            box-sizing: border-box;
            justify-content: flex-start; 
            overflow-y: auto; 
        }

        .card-back::-webkit-scrollbar { width: 6px; }
        .card-back::-webkit-scrollbar-track { background: #1c1c1c; border-radius: 10px; }
        .card-back::-webkit-scrollbar-thumb { background: #0088cc; border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.4s ease forwards; }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .btn-opcion {
            background: #0088cc;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0; 
        }

        .btn-opcion:active { background: #005f8d; }
    </style>
</head>
<body>

    <h2>Anime Kaergsty</h2>

    <div class="search-container">
        <input type="text" id="buscador" placeholder="Buscar anime..." oninput="filtrarAnimes()">
    </div>

    <div class="grid" id="catalogo">
        <div class="card" id="anime1">
            <div class="card-inner">
                <div class="card-front" onclick="seleccionarTemporadas('anime1')">
                    <img src="img/poster01.jpg" alt="Kaguya">
                    <p class="titulo-anime">Kaguya-sama</p> </div>
                <div class="card-back" id="back-anime1"></div>
            </div>
        </div>

        <div class="card" id="anime2">
            <div class="card-inner">
                <div class="card-front" onclick="seleccionarTemporadas('anime2')">
                    <img src="img/poster02.jpg" alt="One Piece">
                    <p class="titulo-anime">One Piece</p>
                </div>
                <div class="card-back" id="back-anime2"></div>
            </div>
        </div>
        
        <div class="card" id="anime3">
            <div class="card-inner">
                <div class="card-front" onclick="seleccionarTemporadas('anime3')">
                    <img src="img/poster02.jpg" alt="Naruto">
                    <p class="titulo-anime">Naruto Shippuden</p>
                </div>
                <div class="card-back" id="back-anime3"></div>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const datosAnime = {
            "anime1": {
                "temporadas": {
                    "Temporada 1": { "Español": "https://t.me/link1", "Japonés": "https://t.me/link2" },
                    "Temporada 2": { "Español": "https://t.me/link3", "Japonés": "https://t.me/link4" },
                    "Temporada 3": { "Español": "https://t.me/link", "Japonés": "https://t.me/link" }
                }
            },
            "anime2": {
                "temporadas": {
                    "Temporada 1": { "Español": "https://t.me/link5", "Japonés": "https://t.me/link6" }
                }
            },
            "anime3": {
                "temporadas": {
                    "Temporada 1": { "Español": "https://t.me/link7", "Japonés": "https://t.me/link8" }
                }
            }
        };

        // --- NUEVO: FUNCIÓN DEL BUSCADOR EN TIEMPO REAL ---
        function filtrarAnimes() {
            // Obtenemos lo que escribiste y lo pasamos a minúsculas
            const textoBuscado = document.getElementById('buscador').value.toLowerCase();
            // Agarramos todas las tarjetas
            const tarjetas = document.querySelectorAll('.card');

            // Revisamos tarjeta por tarjeta
            tarjetas.forEach(tarjeta => {
                // Sacamos el título de cada tarjeta
                const titulo = tarjeta.querySelector('.titulo-anime').innerText.toLowerCase();
                
                // Si el título incluye lo que escribiste, lo mostramos, si no, lo ocultamos
                if (titulo.includes(textoBuscado)) {
                    tarjeta.style.display = "block"; // Mostrar
                } else {
                    tarjeta.style.display = "none";  // Ocultar
                }
            });
        }
        // ---------------------------------------------------

        let idAbierto = null;
        let temporizador = null;

        function iniciarTemporizador(id) {
            if (temporizador) clearTimeout(temporizador);
            temporizador = setTimeout(() => { cerrarCard(id); }, 8000); 
        }

        function seleccionarTemporadas(id) {
            if (idAbierto && idAbierto !== id) cerrarCard(idAbierto);
            if (idAbierto === id) { cerrarCard(id); return; }

            const anime = datosAnime[id];
            const back = document.getElementById('back-' + id);
            
            let html = `<div class="btn-container fade-in">`;
            for (let temp in anime.temporadas) {
                html += `<button class="btn-opcion" onclick="event.stopPropagation(); seleccionarIdiomas('${id}', '${temp}')">${temp}</button>`;
            }
            html += `</div>`;
            
            back.innerHTML = html;
            document.getElementById(id).classList.add('flipped');
            idAbierto = id;

            iniciarTemporizador(id); 
        }

        function seleccionarIdiomas(id, temporada) {
            const anime = datosAnime[id];
            const idiomas = anime.temporadas[temporada];
            const back = document.getElementById('back-' + id);
            
            let html = `<div class="btn-container fade-in">`;
            for (let lang in idiomas) {
                html += `<button class="btn-opcion" onclick="event.stopPropagation(); abrirLink('${idiomas[lang]}')">${lang}</button>`;
            }
            html += `</div>`;
            
            back.innerHTML = html;

            iniciarTemporizador(id); 
        }

        function abrirLink(url) { tg.openTelegramLink(url); }

        function cerrarCard(id) { 
            document.getElementById(id).classList.remove('flipped'); 
            if (temporizador) clearTimeout(temporizador);
            if (idAbierto === id) idAbierto = null;
        }
    </script>
</body>
</html>
