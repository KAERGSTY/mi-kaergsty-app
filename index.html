<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKaergsty Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- DISEÑO ORIGINAL REPARADO --- */
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        #vista-catalogo { padding: 30px; max-width: 1200px; margin: 0 auto; }
        
        .header-catalogo {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #222;
        }

        .titulo-principal { font-size: 30px; font-weight: 800; color: #0088cc; margin: 0; }

        #buscador {
            background: #1a1a1a; border: 1px solid #333; color: white;
            padding: 12px 20px; border-radius: 30px; width: 250px; outline: none;
        }

        .grid-animes { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }

        .tarjeta-anime {
            position: relative; border-radius: 12px; overflow: hidden; cursor: pointer;
            aspect-ratio: 2/3; background: #151515; transition: 0.4s;
        }
        .tarjeta-anime:hover { transform: translateY(-10px); }
        .tarjeta-anime img { width: 100%; height: 100%; object-fit: cover; }
        
        .titulo-tarjeta {
            position: absolute; bottom: 0; width: 100%; padding: 25px 5px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            font-size: 13px; font-weight: bold; text-align: center;
        }

        /* --- VISTA DETALLES --- */
        #vista-detalles { display: none; padding: 20px; min-height: 100vh; }
        .btn-atras { 
            background: #333; color: white; border: none; padding: 10px 20px; 
            border-radius: 20px; cursor: pointer; margin-bottom: 20px;
        }
        .layout-detalles { display: flex; gap: 30px; flex-wrap: wrap; }
        .img-lateral { width: 280px; border-radius: 15px; overflow: hidden; }
        .img-lateral img { width: 100%; display: block; }
        .info-derecha { flex: 1; min-width: 300px; }
        .tag { background: #0088cc; padding: 5px 12px; border-radius: 15px; font-size: 12px; margin-right: 5px; }
        
        .caja-botones { 
            background: #1a1a1a; padding: 20px; border-radius: 15px; 
            display: flex; flex-direction: column; gap: 10px; margin-top: 20px; 
        }
        .btn-accion { background: #0088cc; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-v { background: none; border: none; color: #ff4444; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .txt-guia { color: #888; font-size: 13px; text-transform: uppercase; text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="vista-catalogo">
        <div class="header-catalogo">
            <h1 class="titulo-principal">AKaergsty</h1>
            <input type="text" id="buscador" placeholder="Buscar anime..." oninput="filtrar()">
        </div>
        <div class="grid-animes" id="grid"></div>
    </div>

    <div id="vista-detalles">
        <button class="btn-atras" onclick="cerrar()">← VOLVER AL CATÁLOGO</button>
        <div class="layout-detalles" id="contenido-detalles">
            </div>
    </div>

    <script>
        // CONFIGURACIÓN: Ruta corregida a tu repositorio mi-kaergsty-app
        const urlBaseGitHub = "https://raw.githubusercontent.com/Kaergsty/mi-kaergsty-app/main/img/";

        const base = {
            "Jigokuraku": {
                sinopsis: "Gabimaru el Vacío busca el elixir de la inmortalidad.",
                generos: ["Acción", "Fantasía"],
                enlaces: { "Temporada 1": { "Latino": "https://t.me/c/123/1" } }
            },
            "Solo Leveling": {
                sinopsis: "El cazador más débil se convierte en el más fuerte.",
                generos: ["Acción", "Aventura"],
                enlaces: { "Temporada 1": { "Latino": "https://t.me/c/123/3" } }
            },
            "Kaguya-sama": {
                sinopsis: "Guerra cerebral de amor.",
                generos: ["Comedia", "Romance"],
                portada: "https://i.pinimg.com/1200x/5d/4d/90/5d4d90a821211cec21c463b2b94ab56e.jpg",
                enlaces: { "Temporada 1": { "Latino": "https://t.me/AnimeKaergsty1/5069" } }
            }
        };

        function cargar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            for (const nombre in base) {
                const anime = base[nombre];
                const div = document.createElement('div');
                div.className = 'tarjeta-anime';
                div.onclick = () => abrir(nombre);
                
                // Lógica Híbrida: Usa 'portada' si existe, si no construye link de GitHub
                let imgUrl = anime.portada ? anime.portada : urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
                
                div.innerHTML = `
                    <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/160x240/222/555?text=Error+Img'">
                    <div class="titulo-tarjeta">${nombre}</div>
                `;
                grid.appendChild(div);
            }
        }

        function abrir(nombre) {
            const anime = base[nombre];
            let imgUrl = anime.portada ? anime.portada : urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
            const cont = document.getElementById('contenido-detalles');

            cont.innerHTML = `
                <div class="img-lateral"><img src="${imgUrl}"></div>
                <div class="info-derecha">
                    <h1>${nombre}</h1>
                    <div id="det-generos" style="margin-bottom:15px;"></div>
                    <p style="line-height:1.6; color:#ccc;">${anime.sinopsis}</p>
                    <div class="caja-botones" id="area-botones"></div>
                </div>
            `;

            const gens = document.getElementById('det-generos');
            anime.generos.forEach(g => gens.innerHTML += `<span class="tag">${g}</span>`);

            document.getElementById('vista-catalogo').style.display = 'none';
            document.getElementById('vista-detalles').style.display = 'block';
            window.scrollTo(0,0);
            mostrarT(nombre);
        }

        function mostrarT(nombre) {
            const area = document.getElementById('area-botones');
            area.innerHTML = `<span class="txt-guia">Temporadas</span>`;
            Object.keys(base[nombre].enlaces).forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion';
                btn.innerText = t;
                btn.onclick = () => mostrarI(nombre, t);
                area.appendChild(btn);
            });
        }

        function mostrarI(nombre, t) {
            const area = document.getElementById('area-botones');
            const links = base[nombre].enlaces[t];
            area.innerHTML = `<span class="txt-guia">Idiomas - ${t}</span>`;
            Object.keys(links).forEach(idioma => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion';
                btn.innerText = idioma;
                btn.onclick = () => {
                    if (window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.openLink(links[idioma]);
                    } else {
                        window.open(links[idioma], '_blank');
                    }
                };
                area.appendChild(btn);
            });
            const back = document.createElement('button');
            back.className = 'btn-v';
            back.innerText = "← VOLVER";
            back.onclick = () => mostrarT(nombre);
            area.appendChild(back);
        }

        function cerrar() {
            document.getElementById('vista-detalles').style.display = 'none';
            document.getElementById('vista-catalogo').style.display = 'block';
        }

        function filtrar() {
            const v = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.tarjeta-anime').forEach(t => {
                t.style.display = t.innerText.toLowerCase().includes(v) ? 'block' : 'none';
            });
        }

        cargar();
    </script>
</body>
</html>
