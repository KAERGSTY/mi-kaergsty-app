<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKaergsty Premium</title>
    <style>
        /* --- ESTILOS BASE --- */
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* --- VISTA CATÁLOGO --- */
        #vista-catalogo { padding: 30px; max-width: 1200px; margin: 0 auto; }
        
        .header-catalogo {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #222;
        }

        .titulo-principal { font-size: 30px; font-weight: 800; color: #0088cc; margin: 0; letter-spacing: 1px; }

        #buscador {
            background: #1a1a1a; border: 1px solid #333; color: white;
            padding: 12px 20px; border-radius: 30px; width: 250px; outline: none;
            transition: 0.3s;
        }
        #buscador:focus { border-color: #0088cc; box-shadow: 0 0 10px rgba(0, 136, 204, 0.2); }

        .grid-animes { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }

        .tarjeta-anime {
            position: relative; border-radius: 12px; overflow: hidden; cursor: pointer;
            aspect-ratio: 2/3; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #151515;
        }
        .tarjeta-anime:hover { transform: translateY(-10px); box-shadow: 0 10px 25px rgba(0, 136, 204, 0.3); }
        .tarjeta-anime img { width: 100%; height: 100%; object-fit: cover; }
        .titulo-tarjeta {
            position: absolute; bottom: 0; width: 100%; padding: 25px 5px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            font-size: 13px; font-weight: bold; text-align: center;
        }

        /* --- VISTA DETALLES (ILUMINADA) --- */
        #vista-detalles { display: none; min-height: 100vh; position: relative; }

        /* Banner de fondo con iluminación */
        .bg-banner {
            position: absolute; top: 0; left: 0; width: 100%; height: 700px;
            z-index: -2; opacity: 0.5; filter: blur(50px); object-fit: cover;
        }

        #vista-detalles::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(0, 136, 204, 0.2) 0%, transparent 70%);
            z-index: -1;
        }

        .header-detalles { padding: 20px 30px; }
        .btn-atras {
            background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 20px;
            border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .btn-atras:hover { background: #0088cc; }

        .layout-detalles {
            display: flex; gap: 40px; max-width: 1100px; margin: 20px auto;
            padding: 0 20px; align-items: flex-start;
        }

        .img-lateral {
            flex: 0 0 300px; border-radius: 15px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
        }
        .img-lateral img { width: 100%; display: block; }

        .info-derecha { flex: 1; }
        .titulo-anime { font-size: 40px; margin: 0 0 15px 0; font-weight: 800; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .generos { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 25px; }
        .tag { background: #0088cc; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; }

        .caja-sinopsis {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            padding: 30px; border-radius: 20px; border-left: 5px solid #0088cc;
            line-height: 1.8; color: #eee; margin-bottom: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        .centro-botones { display: flex; justify-content: center; width: 100%; }
        .caja-botones {
            background: rgba(20, 20, 20, 0.8); padding: 30px; border-radius: 25px;
            width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); border: 1px solid #333;
        }
        .txt-guia { color: #888; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; text-align: center; font-weight: bold; }

        .btn-accion {
            background: #0088cc; color: white; border: none; padding: 15px;
            border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer;
            transition: 0.3s;
        }
        .btn-accion:hover { background: #00aaff; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0, 136, 204, 0.4); }

        .btn-v { background: none; border: none; color: #ff4444; font-weight: bold; cursor: pointer; margin-top: 5px;}

        /* Responsivo */
        @media (max-width: 850px) {
            .layout-detalles { flex-direction: column; align-items: center; }
            .img-lateral { width: 260px; flex: none; }
            .titulo-anime { text-align: center; font-size: 32px; }
            .generos { justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="vista-catalogo">
        <div class="header-catalogo">
            <h1 class="titulo-principal">AKaergsty</h1>
            <input type="text" id="buscador" placeholder="Buscar anime..." oninput="filtrar()">
        </div>
        <div class="grid-animes" id="grid"></div>
    </div>

    <div id="vista-detalles">
        <img id="bg-bluroso" class="bg-banner" src="" alt="">
        <div class="header-detalles">
            <button class="btn-atras" onclick="cerrar()">← VOLVER AL CATÁLOGO</button>
        </div>

        <div class="layout-detalles">
            <div class="img-lateral">
                <img id="det-img" src="" alt="">
            </div>

            <div class="info-derecha">
                <h1 id="det-titulo" class="titulo-anime"></h1>
                <div id="det-generos" class="generos"></div>
                
                <div class="caja-sinopsis">
                    <p id="det-sinopsis"></p>
                </div>

                <div class="centro-botones">
                    <div class="caja-botones" id="area-botones"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* --- BASE DE DATOS (AQUÍ AGREGAS TUS ANIMES) --- */
        const base = {
            "Jigokuraku": {
                sinopsis: "Gabimaru el Vacío es sentenciado a muerte. Su única esperanza es viajar a una isla misteriosa para encontrar el Elixir de la Vida.",
                generos: ["Acción", "Fantasía Oscura", "Ninja"],
                enlaces: {
                    "Temporada 1": { "Latino": "https://t.me/ejemplo1", "Japonés": "https://t.me/ejemplo2" }
                }
            },
            "Solo Leveling": {
                sinopsis: "En un mundo donde cazadores deben luchar contra monstruos, el cazador más débil de la humanidad recibe un poder extraño.",
                generos: ["Acción", "Aventura", "RPG"],
                enlaces: {
                    "Temporada 1": { "Latino": "https://t.me/ejemplo3" }
                }
            },
            // Solo copia un bloque de arriba y pégalo aquí para añadir más.
        };

        /* --- LÓGICA AUTOMÁTICA --- */

        function cargar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            for (const nombre in base) {
                const div = document.createElement('div');
                div.className = 'tarjeta-anime';
                div.onclick = () => abrir(nombre);
                
                // Busca automáticamente la imagen con el nombre del anime
                div.innerHTML = `
                    <img src="img/${nombre}.webp" onerror="this.src='https://via.placeholder.com/160x240/111/555?text=${nombre}'">
                    <div class="titulo-tarjeta">${nombre}</div>
                `;
                grid.appendChild(div);
            }
        }

        function abrir(nombre) {
            const anime = base[nombre];
            
            // Portada automática
            document.getElementById('det-img').src = `img/${nombre}.webp`;
            
            // Intenta poner el banner. Si no existe, el navegador usará la portada (gracias al CSS se verá bien igual)
            const imgBanner = `img/${nombre}-banner.webp`;
            document.getElementById('bg-bluroso').src = imgBanner;
            
            // Rellenar textos
            document.getElementById('det-titulo').innerText = nombre;
            document.getElementById('det-sinopsis').innerText = anime.sinopsis;

            // Rellenar géneros
            const gens = document.getElementById('det-generos');
            gens.innerHTML = "";
            anime.generos.forEach(g => {
                gens.innerHTML += `<span class="tag">${g}</span>`;
            });

            // Cambiar vista
            document.getElementById('vista-catalogo').style.display = 'none';
            document.getElementById('vista-detalles').style.display = 'block';
            window.scrollTo(0,0);
            mostrarTemporadas(nombre);
        }

        function mostrarTemporadas(nombre) {
            const area = document.getElementById('area-botones');
            area.innerHTML = `<span class="txt-guia">Temporadas</span>`;
            
            Object.keys(base[nombre].enlaces).forEach(temp => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion';
                btn.innerText = temp;
                btn.onclick = () => mostrarIdiomas(nombre, temp);
                area.appendChild(btn);
            });
        }

        function mostrarIdiomas(nombre, temp) {
            const area = document.getElementById('area-botones');
            const idiomas = base[nombre].enlaces[temp];
            area.innerHTML = `<span class="txt-guia">${temp}</span>`;
            
            Object.keys(idiomas).forEach(idioma => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion';
                btn.innerText = idioma;
                btn.onclick = () => window.open(idiomas[idioma], '_blank');
                area.appendChild(btn);
            });

            const btnVolver = document.createElement('button');
            btnVolver.className = 'btn-v';
            btnVolver.innerText = "← VOLVER";
            btnVolver.onclick = () => mostrarTemporadas(nombre);
            area.appendChild(btnVolver);
        }

        function cerrar() {
            document.getElementById('vista-detalles').style.display = 'none';
            document.getElementById('vista-catalogo').style.display = 'block';
        }

        function filtrar() {
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const tarjetas = document.querySelectorAll('.tarjeta-anime');
            
            tarjetas.forEach(tarjeta => {
                const texto = tarjeta.innerText.toLowerCase();
                tarjeta.style.display = texto.includes(busqueda) ? 'block' : 'none';
            });
        }

        // Iniciar catálogo
        cargar();
    </script>
</body>
</html>
