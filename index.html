<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AKaergsty Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            /* Se aclaró sutilmente para que se note la animación, sin perder el aspecto oscuro premium */
            background: linear-gradient(-45deg, #11141c, #223758, #2d1a50, #11141c);
            background-size: 400% 400%;
            animation: moverFondo 15s ease infinite;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        @keyframes moverFondo {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        #vista-catalogo { 
            padding: 20px; 
            width: 100%;
            max-width: 1200px; 
            margin: 0 auto;
            box-sizing: border-box;
        }
        .header-catalogo {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap; gap: 15px;
        }
        .titulo-principal { 
            font-size: 28px; 
            font-weight: 800; 
            color: #00aaff; 
            margin: 0; 
            letter-spacing: 1px; 
            animation: brilloSutil 3s ease-in-out infinite; 
        }
        @keyframes brilloSutil {
            0%, 100% { text-shadow: 0 0 5px rgba(0, 136, 204, 0.4); }
            50% { text-shadow: 0 0 15px rgba(0, 170, 255, 0.9), 0 0 25px rgba(0, 170, 255, 0.5); color: #33bbff; }
        }
        #buscador {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white;
            padding: 10px 18px; border-radius: 30px; width: 230px; outline: none;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        #buscador:focus { border-color: #0088cc; background: rgba(255, 255, 255, 0.08); }
        .grid-animes { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .tarjeta-anime {
            position: relative; border-radius: 10px; overflow: hidden; cursor: pointer;
            aspect-ratio: 2/3; transition: 0.3s ease-out;
            background: #151515;
            border: 1px solid rgba(255,255,255,0.02);
        }
        .tarjeta-anime:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0, 136, 204, 0.3); border-color: rgba(0, 136, 204, 0.4);}
        .tarjeta-anime img { width: 100%; height: 100%; object-fit: cover; }
        .titulo-tarjeta {
            position: absolute; bottom: 0; width: 100%; padding: 25px 5px 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            font-size: 13px; font-weight: bold; text-align: center; box-sizing: border-box;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        #vista-detalles { 
            display: none; min-height: 100vh; position: relative; 
            width: 100%; max-width: 1200px; margin: 0 auto; box-sizing: border-box;
            padding-bottom: 40px; 
        }
        .bg-banner {
            position: absolute; top: 0; left: 0; width: 100vw; 
            height: 500px; 
            z-index: -2; opacity: 0.3; filter: blur(45px); object-fit: cover;
            margin-left: calc(-50vw + 50%);
        }
        .layout-detalles {
            display: flex; gap: 30px; 
            max-width: 1100px; margin: 0 auto;
            padding: 20px; align-items: flex-start; box-sizing: border-box;
        }
        .img-lateral {
            flex: 0 0 260px; 
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.08);
            margin-top: 20px;
        }
        .img-lateral img { width: 100%; display: block; }
        .info-derecha { flex: 1; display: flex; flex-direction: column; gap: 8px; position: relative;}
        .header-info { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 5px; flex-wrap: wrap; }
        .titulo-anime { font-size: 36px; margin: 0; font-weight: 800; line-height: 1.1; flex: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.5);}
        .estado-container {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; font-weight: 600; color: #aaa;
            margin-top: -5px; 
        }
        .punto {
            width: 9px; height: 9px; border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 5px rgba(255,255,255,0.2);
        }
        .punto-rojo { background-color: #ff4444; animation: pulsoRojo 1.5s infinite ease-in-out; }
        @keyframes pulsoRojo {
            0% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 0 5px rgba(255, 68, 68, 0); }
            100% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }
        .punto-verde { background-color: #00cc66; animation: pulsoVerde 1.5s infinite ease-in-out; }
        @keyframes pulsoVerde {
            0% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 204, 102, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 0 5px rgba(0, 204, 102, 0); }
            100% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 204, 102, 0); }
        }
        .txt-finalizado { color: #ff6666; }
        .txt-emision { color: #00ff88; }
        .soporte-container {
            display: flex; gap: 10px; align-items: center;
            margin-top: 5px; 
        }
        .btn-soporte {
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            color: #999; 
            padding: 8px 16px; border-radius: 20px;
            font-size: 12px; font-weight: bold; text-transform: uppercase;
            cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(5px); 
            display: flex; align-items: center; gap: 6px;
        }
        .btn-soporte:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }
        /* Botón de Suscripción (Azul) */
        .btn-subs {
            color: #0088cc;
            border-color: rgba(0, 136, 204, 0.3);
            animation: pulsoBordeSubs 2.5s infinite;
        }
        .btn-subs:hover {
            color: #fff;
            background: rgba(0, 136, 204, 0.15);
            border-color: rgba(0, 136, 204, 0.6);
        }
        @keyframes pulsoBordeSubs {
            0% { box-shadow: 0 0 0 0 rgba(0, 136, 204, 0.15); border-color: rgba(0, 136, 204, 0.2); }
            50% { box-shadow: 0 0 0 4px rgba(0, 136, 204, 0); border-color: rgba(0, 136, 204, 0.5); }
            100% { box-shadow: 0 0 0 0 rgba(0, 136, 204, 0); border-color: rgba(0, 136, 204, 0.2); }
        }
        /* Botón de Donar (Rojo) */
        .btn-donar {
            color: #ff4444;
            border-color: rgba(255, 68, 68, 0.3);
            animation: pulsoBordeDonar 2.5s infinite;
        }
        .btn-donar:hover {
            color: #fff;
            background: rgba(255, 68, 68, 0.15);
            border-color: rgba(255, 68, 68, 0.6);
        }
        @keyframes pulsoBordeDonar {
            0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.15); border-color: rgba(255, 68, 68, 0.2); }
            50% { box-shadow: 0 0 0 4px rgba(255, 68, 68, 0); border-color: rgba(255, 68, 68, 0.5); }
            100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); border-color: rgba(255, 68, 68, 0.2); }
        }

        .nombres-opcionales {
            display: flex; flex-direction: column; gap: 2px;
            margin-top: 2px; margin-bottom: 10px;
            font-size: 13px; color: #888;
        }
        .nombres-linea { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .tag-idioma {
            font-style: italic; background: rgba(255,255,255,0.03);
            padding: 3px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.04);
        }
        .generos { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 15px; }
        .tag { background: rgba(0, 136, 204, 0.2); border: 1px solid rgba(0, 136, 204, 0.4); color: #66ccff; padding: 5px 14px; border-radius: 20px; font-size: 11px; font-weight: bold; text-shadow: 0 1px 2px rgba(0,0,0,0.5);}
        .contenedor-sinopsis-acciones {
            background: rgba(20, 20, 25, 0.4); backdrop-filter: blur(12px);
            border-radius: 14px; border-left: 4px solid #0088cc;
            margin-bottom: 25px; box-sizing: border-box;
            border-top: 1px solid rgba(255,255,255,0.03);
            border-right: 1px solid rgba(255,255,255,0.03);
            border-bottom: 1px solid rgba(255,255,255,0.03);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .caja-sinopsis {
            padding: 20px; 
            line-height: 1.6; color: #ddd; font-size: 14px;
        }
        .caja-sinopsis p { margin: 0; }
        .barra-acciones {
            display: flex; gap: 10px; padding: 0 20px 15px; 
            flex-wrap: wrap;
        }
        .barra-acciones:empty { padding: 0; display: none; }
        .centro-botones { display: flex; justify-content: flex-start; width: 100%; margin-top: 10px;}
        .caja-botones {
            background: rgba(15, 18, 25, 0.65); backdrop-filter: blur(15px); 
            padding: 25px; border-radius: 20px;
            width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px;
            border: 1px solid rgba(255,255,255,0.06); box-sizing: border-box;
            box-shadow: 0 12px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .txt-guia { 
            color: #888; font-size: 11px; text-transform: uppercase; 
            text-align: center; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px;
        }
        .btn-accion {
            background: linear-gradient(135deg, rgba(0, 136, 204, 0.8) 0%, rgba(0, 85, 128, 0.8) 100%);
            color: white; border: 1px solid rgba(255,255,255,0.1); 
            padding: 14px; border-radius: 12px; 
            font-weight: 600; font-size: 14px; letter-spacing: 0.5px;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0, 136, 204, 0.15);
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn-accion:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(0, 136, 204, 0.4);
            border-color: rgba(255,255,255,0.3);
            background: linear-gradient(135deg, rgba(0, 153, 230, 0.9) 0%, rgba(0, 102, 153, 0.9) 100%);
        }
        .btn-accion:active { transform: scale(0.98) translateY(1px); box-shadow: 0 2px 10px rgba(0, 136, 204, 0.2); }
        .btn-v { 
            background: rgba(255, 68, 68, 0.1); border: 1px solid rgba(255, 68, 68, 0.2); 
            color: #ff6666; font-weight: bold; cursor: pointer; 
            padding: 12px; border-radius: 12px; margin-top: 5px; font-size: 12px;
            transition: 0.3s;
        }
        .btn-v:hover { background: rgba(255, 68, 68, 0.2); border-color: rgba(255, 68, 68, 0.4); color: #fff; }
        .animar-entrada {
            opacity: 0;
            animation: entradaSuave 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }
        @keyframes entradaSuave {
            0% { opacity: 0; transform: translateY(15px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 850px) {
            .layout-detalles { flex-direction: column; align-items: center; gap: 15px; padding: 15px; }
            .img-lateral { width: 220px; flex: none; margin-top: 10px; }
            .info-derecha { align-items: center; text-align: center; width: 100%;}
            .header-info { flex-direction: column; align-items: center; gap: 5px; width: 100%; }
            .titulo-anime { font-size: 28px; text-align: center; width: 100%;}
            .estado-container { justify-content: center; margin-top: 2px;}
            .soporte-container { justify-content: center; margin-top: 10px; width: 100%;}
            .btn-soporte { padding: 8px 14px; font-size: 11px; }
            .nombres-linea { justify-content: center; }
            .generos { justify-content: center; }
            .barra-acciones { justify-content: center; padding: 0 10px 15px;}
            .caja-sinopsis { text-align: left; font-size: 13.5px; padding: 18px;}
            .centro-botones { justify-content: center; }
        }
        .btn-comentario-especial {
            background: linear-gradient(135deg, rgba(0, 136, 204, 0.2) 0%, rgba(0, 85, 128, 0.4) 100%) !important;
            border: 1px solid rgba(0, 170, 255, 0.3) !important;
            margin-top: 15px !important;
            color: #00aaff !important;
            font-weight: bold !important;
            text-transform: uppercase;
            letter-spacing: 1px;

        }
        .btn-comentario-especial:active{
            transform: scale(0.95);
            background: rgba(0, 170, 255, 0.3) !important;
        }
        .btn-comentarios {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 12px;
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            width: 100%;
        }

        .btn-comentarios:hover {
            background: rgba(255, 255, 255, 0.2) !important;
            transform: translateY(-2px);
        }

        .btn-loading {
            opacity: 0.7;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-loading::after {
            content: " ⌛";
            animation: girar 1s infinite linear;
            display: inline-block;
        }

        @keyframes girar {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

    <div id="vista-catalogo">

                enlaces:{
                    "Temporada 1" :{
                        "Japonés":"https://t.me/AnimeKaergsty1/4151"}
                }
            }
        };

        function cargar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            for (const nombre in base) {
                const anime = base[nombre];
                const div = document.createElement('div');
                div.className = 'tarjeta-anime';
                div.onclick = () => abrir(nombre);
                let imgUrl = anime.portada ? anime.portada : urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
                div.innerHTML = `
                    <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150x225/222/555?text=Error+Img'">
                    <div class="titulo-tarjeta">${nombre}</div>
                `;
                grid.appendChild(div);
            }
            tg.BackButton.hide();
        }

        function abrir(nombre) {
            const anime = base[nombre];
            let imgUrl = anime.portada ? anime.portada : urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
            
            document.getElementById('det-img').src = imgUrl;
            document.getElementById('bg-bluroso').src = imgUrl;
            document.getElementById('det-titulo').innerText = nombre;
            document.getElementById('det-sinopsis').innerText = anime.sinopsis;

            const nomCont = document.getElementById('det-nombres-opcionales');
            nomCont.innerHTML = "";
            if (anime.nombresAlternativos) {
                const linea = document.createElement('div');
                linea.className = 'nombres-linea';
                for (const lang in anime.nombresAlternativos) {
                    const tag = document.createElement('span');
                    tag.className = 'tag-idioma';
                    tag.innerText = anime.nombresAlternativos[lang]; 
                    linea.appendChild(tag);
                }
                nomCont.appendChild(linea);
            }

            const sopCont = document.getElementById('det-soporte');
            const urlSuscripcion = "https://paypal.me/AnimeKaergsty"; 
            const urlDonacion = "https://ko-fi.com/summary/db8dfda1-f2d5-4607-93c8-4ce3d83c9d0b";
            
            // Aquí se agregan las clases btn-subs y btn-donar correspondientemente
            sopCont.innerHTML = `
                <button class="btn-soporte btn-subs" onclick="abrirSoporte('${urlSuscripcion}')">★ Suscripción</button>
                <button class="btn-soporte btn-donar" onclick="abrirSoporte('${urlDonacion}')">♥ Donar</button>
            `;

            const estCont = document.getElementById('det-estado');
            let puntoClase = "punto-rojo", textoClase = "txt-finalizado";
            if (anime.estado === "En Emisión") { puntoClase = "punto-verde"; textoClase = "txt-emision"; }
            estCont.innerHTML = `<span>Estado:</span><span class="punto ${puntoClase}"></span><span class="${textoClase}">${anime.estado}</span>`;

            const gens = document.getElementById('det-generos');
            gens.innerHTML = "";
            anime.generos.forEach(g => { gens.innerHTML += `<span class="tag">${g}</span>`; });

            actualizarBarraAcciones();

            document.getElementById('vista-catalogo').style.display = 'none';
            document.getElementById('vista-detalles').style.display = 'block';
            window.scrollTo(0,0);
            
            mostrarT(nombre);
            tg.BackButton.show();
        }

        function actualizarBarraAcciones() {
            const area = document.getElementById('barra-acciones');    
            area.innerHTML = "";
        }

        function abrirSoporte(url) { if (tg && tg.openLink) { tg.openLink(url); } else { window.open(url, '_blank'); } }

        function volverAlCatalogo() {
            document.getElementById('vista-detalles').style.display = 'none';
            document.getElementById('vista-catalogo').style.display = 'block';
            tg.BackButton.hide();
        }

        function mostrarT(nombre) {
            const area = document.getElementById('area-botones');
            area.innerHTML = '<span class="txt-guia">Temporadas</span>';
            
            const temporadas = Object.keys(base[nombre].enlaces);
            temporadas.forEach((t, index) => {
                const btn = document.createElement('button');
                btn.innerText = t;
                btn.className = 'btn-accion animar-entrada';
                btn.style.animationDelay = `${index * 0.1}s`;
                btn.onclick = () => mostrarI(nombre, t);
                area.appendChild(btn);
            });

            const btnCom = document.createElement('button');
            btnCom.innerText = "💬 COMENTARIOS";
            btnCom.className = "btn-comentarios animar-entrada"; // Clase nueva
            btnCom.onclick = function() { crearOabrirTopic(nombre, this); }; // 'this' para el cargando
            area.appendChild(btnCom);
        }

        function mostrarI(nombre, t) {
            const area = document.getElementById('area-botones');
            const links = base[nombre].enlaces[t];
            area.innerHTML = `<span class="txt-guia">Idiomas - ${t}</span>`;
            Object.keys(links).forEach((idioma, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion animar-entrada';
                btn.style.animationDelay = `${index * 0.1}s`; 
                btn.innerHTML = `▶️ ${idioma}`;
                btn.onclick = () => { 
                    if (window.Telegram && window.Telegram.WebApp) { 
                        window.Telegram.WebApp.openTelegramLink(links[idioma]); 
                    } else { 
                        window.open(links[idioma], '_blank'); 
                    } 
                };
                area.appendChild(btn);
            });
            const back = document.createElement('button');
            back.className = 'btn-v animar-entrada';
            back.style.animationDelay = `${Object.keys(links).length * 0.1}s`;
            back.innerText = "← VOLVER A TEMPORADAS";
            back.onclick = () => mostrarT(nombre);
            area.appendChild(back);
        }

        function filtrar() {
            const v = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.tarjeta-anime').forEach(t => { 
                t.style.display = t.innerText.toLowerCase().includes(v) ? 'block' : 'none'; 
            });
        }
        async function crearOabrirTopic(nombreAnime, elementoBoton) {
    const tg = window.Telegram.WebApp;
    const urlServidor = 'https://mi-kaergsty-app.onrender.com/crear-topic';

    // ANTI-SPAM FRONTEND: Si el botón ya está desactivado, ignoramos el clic
    if (elementoBoton.disabled) return;

    const textoOriginal = elementoBoton.innerText;
    elementoBoton.innerText = "CARGANDO...";
    elementoBoton.classList.add('btn-loading');
    
    // Desactivamos el botón físicamente para que no reciba más clics
    elementoBoton.disabled = true; 
    elementoBoton.style.pointerEvents = 'none'; 

    try {
        const respuesta = await fetch(urlServidor, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ nombreAnime: nombreAnime })
        });
        
        const datos = await respuesta.json();

        if (datos.success) {
            tg.openTelegramLink(datos.link);
        } else {
            // Si el servidor nos devuelve un error (ej. Anti-spam o falla de Telegram)
            console.error("Error del servidor:", datos.error);
            tg.showAlert(datos.error || "Hubo un problema al abrir los comentarios.");
        }
    } catch (e) {
        // Este catch atrapa errores de red (cuando el servidor de Render está dormido)
        console.error("Error de red:", e);
        tg.showAlert("El servidor está despertando, intenta de nuevo en unos segundos.");
    } finally {
        // IMPORTANTE: Siempre restaurar el botón al terminar, pase lo que pase
        elementoBoton.innerText = textoOriginal;
        elementoBoton.classList.remove('btn-loading');
        elementoBoton.disabled = false;
        elementoBoton.style.pointerEvents = 'auto';
    }
}

        cargar();
    </script>
