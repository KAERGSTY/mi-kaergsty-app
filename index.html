<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeKaergsty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* 1. DISEÑO GENERAL */
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding-top: 50px; }
        h2 { color: #0088cc; text-align: center; margin-bottom: 30px; }

        /* 2. DISEÑO DEL CATÁLOGO */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, 160px); gap: 20px; padding: 20px; justify-content: center; }
        .card { background: #2a2a2a; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.2s; text-align: center; }
        .card img { width: 100%; height: 230px; object-fit: cover; display: block; }
        .card p { font-size: 14px; font-weight: bold; margin: 10px 5px; color: white; }
        .card:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0, 136, 204, 0.4); }

        /* 3. DISEÑO DE LA VENTANITA (MODAL) */
        #modal-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: flex; justify-content: center; align-items: center;
            z-index: 1000; visibility: hidden; opacity: 0; transition: 0.3s;
        }
        #modal-container.visible { visibility: visible; opacity: 1; }

        .modal-content {
            background: #2a2a2a; padding: 20px; border-radius: 15px;
            width: 160px; /* Tamaño exacto de tu imagen */
            text-align: center; border: 2px solid #0088cc;
        }

        #modal-buttons { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }

        /* Estilo de los botones azules */
        .btn-opcion {
            background: #0088cc; color: white; border: none; padding: 10px;
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px;
        }

        .btn-cerrar { background: none; color: #ff4444; border: none; cursor: pointer; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>Anime Kaergsty</h2>

    <div id="modal-container" onclick="cerrarModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h4 id="modal-title" style="margin:0; color:#0088cc;">Opciones</h4>
            <div id="modal-buttons">
                </div>
            <button class="btn-cerrar" onclick="cerrarModal()">[ CERRAR ]</button>
        </div>
    </div>

    <div class="grid">
        <div class="card" onclick="iniciarSeleccion('Kaguya-sama', datosKaguya)">
            <img src="img/poster01.jpg" alt="Kaguya">
            <p>Kaguya-sama</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // AQUÍ GUARDAS LOS LINKS DE TUS ANIMES
        const datosKaguya = {
            "Temporada 1": {
                "Español": "https://t.me/AnimeKaergsty1/5067",
                "Japonés": "https://t.me/AnimeKaergsty1/5068"
            },
            "Temporada 2": {
                "Español": "https://t.me/AnimeKaergsty1/5069",
                "Japonés": "https://t.me/AnimeKaergsty1/5070"
            }
        };

        let animeActual = "";
        let datosActuales = {};

        // PASO 1: Mostrar Temporadas
        function iniciarSeleccion(titulo, datos) {
            animeActual = titulo;
            datosActuales = datos;
            mostrarTemporadas();
            document.getElementById('modal-container').classList.add('visible');
        }

        function mostrarTemporadas() {
            document.getElementById('modal-title').innerText = "Temporadas";
            const container = document.getElementById('modal-buttons');
            container.innerHTML = '';

            for (const temp in datosActuales) {
                const btn = document.createElement('button');
                btn.className = 'btn-opcion';
                btn.innerText = temp;
                btn.onclick = () => mostrarIdiomas(temp); // Al hacer clic, va a idiomas
                container.appendChild(btn);
            }
        }

        // PASO 2: Mostrar Idiomas de esa Temporada
        function mostrarIdiomas(temporada) {
            document.getElementById('modal-title').innerText = temporada;
            const container = document.getElementById('modal-buttons');
            container.innerHTML = '';

            const idiomas = datosActuales[temporada];

            for (const lang in idiomas) {
                const btn = document.createElement('button');
                btn.className = 'btn-opcion';
                btn.innerText = lang;
                btn.onclick = () => {
                    tg.openTelegramLink(idiomas[lang]); // Abre el link final
                    cerrarModal();
                };
                container.appendChild(btn);
            }

            // Botón para regresar a temporadas
            const btnVolver = document.createElement('button');
            btnVolver.innerText = "← Volver";
            btnVolver.className = 'btn-cerrar';
            btnVolver.style.color = "#aaa";
            btnVolver.onclick = mostrarTemporadas;
            container.appendChild(btnVolver);
        }

        function cerrarModal() {
            document.getElementById('modal-container').classList.remove('visible');
        }
    </script>
</body>
</html>
