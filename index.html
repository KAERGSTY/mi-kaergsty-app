<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AKaergsty Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* --- ESTILOS BASE --- */
        body {
            margin: 0; padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- BARRA DE CONTROLES (YA OCULTA) --- */
        .controles-app { display: none; }

        /* --- VISTA CATÁLOGO --- */
        #vista-catalogo { 
            padding: 20px; 
            width: 100%;
            max-width: 1200px; 
            margin: 0 auto;
            box-sizing: border-box;
        }
        
        .header-catalogo {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #222;
            flex-wrap: wrap; gap: 15px;
        }

        .titulo-principal { font-size: 28px; font-weight: 800; color: #0088cc; margin: 0; letter-spacing: 1px; }

        #buscador {
            background: #1a1a1a; border: 1px solid #333; color: white;
            padding: 10px 18px; border-radius: 30px; width: 230px; outline: none;
            transition: 0.3s;
        }

        .grid-animes { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }

        .tarjeta-anime {
            position: relative; border-radius: 10px; overflow: hidden; cursor: pointer;
            aspect-ratio: 2/3; transition: 0.3s ease-out;
            background: #151515;
        }
        .tarjeta-anime:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0, 136, 204, 0.2); }
        .tarjeta-anime img { width: 100%; height: 100%; object-fit: cover; }
        .titulo-tarjeta {
            position: absolute; bottom: 0; width: 100%; padding: 20px 5px 8px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            font-size: 12px; font-weight: bold; text-align: center; box-sizing: border-box;
        }

        /* --- VISTA DETALLES (OPTIMIZADA) --- */
        #vista-detalles { 
            display: none; min-height: 100vh; position: relative; 
            width: 100%; max-width: 1200px; margin: 0 auto; box-sizing: border-box;
            padding-bottom: 40px; /* Espacio al final */
        }

        .bg-banner {
            position: absolute; top: 0; left: 0; width: 100vw; 
            height: 500px; /* REDUCIDO DE 700PX A 500PX */
            z-index: -2; opacity: 0.4; filter: blur(40px); object-fit: cover;
            margin-left: calc(-50vw + 50%);
        }
        
        /* Layout más compacto */
        .layout-detalles {
            display: flex; gap: 30px; /* Reducido gap */
            max-width: 1100px; margin: 0 auto; /* Eliminado margen superior grande */
            padding: 20px; align-items: flex-start; box-sizing: border-box;
        }

        .img-lateral {
            flex: 0 0 260px; /* Reducido ancho fijo */
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.08);
            margin-top: 20px; /* Un poco de margen superior */
        }
        .img-lateral img { width: 100%; display: block; }

        .info-derecha { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .titulo-anime { font-size: 36px; margin: 0; font-weight: 800; line-height: 1.1; }

        /* --- ESTILOS DE ESTADO Y PUNTOS ANIMADOS --- */
        .estado-container {
            display: flex; align-items: center; gap: 8px;
            font-size: 14px; font-weight: 600; color: #aaa;
            margin-top: 5px;
        }
        
        .punto {
            width: 10px; height: 10px; border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 5px rgba(255,255,255,0.2);
            /* Animación de pulso */
            animation: pulsoPunto 1.5s infinite ease-in-out;
        }
        
        /* Definición de la animación de pulso */
        @keyframes pulsoPunto {
            0% { transform: scale(0.9); opacity: 0.7; box-shadow: 0 0 0 0 rgba(255,255,255,0.1); }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 0 4px rgba(255,255,255,0); }
            100% { transform: scale(0.9); opacity: 0.7; box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }
        
        /* Colores específicos con variación de sombra para la animación */
        .punto-rojo { background-color: #ff4444; }
        .punto-rojo { animation-name: pulsoRojo; }
        @keyframes pulsoRojo {
            0% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 0 5px rgba(255, 68, 68, 0); }
            100% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }

        .punto-verde { background-color: #00cc66; }
        .punto-verde { animation-name: pulsoVerde; }
        @keyframes pulsoVerde {
            0% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 204, 102, 0.4); }
            50% { opacity: 1; box-shadow: 0 0 0 5px rgba(0, 204, 102, 0); }
            100% { opacity: 0.6; box-shadow: 0 0 0 0 rgba(0, 204, 102, 0); }
        }

        /* Texto de estado específico */
        .txt-finalizado { color: #ff6666; }
        .txt-emision { color: #00ff88; }

        .generos { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 15px; }
        .tag { background: #0088cc; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }

        .caja-sinopsis {
            background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(10px);
            padding: 20px; border-radius: 15px; border-left: 4px solid #0088cc;
            line-height: 1.6; color: #ddd; font-size: 15px;
            margin-bottom: 25px; /* Reducido margen inferior */
            box-sizing: border-box;
        }
        .caja-sinopsis p { margin: 0; }

        .centro-botones { display: flex; justify-content: center; width: 100%; }
        .caja-botones {
            background: rgba(20, 20, 20, 0.9); padding: 25px; border-radius: 20px;
            width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px;
            border: 1px solid #333; box-sizing: border-box;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .txt-guia { color: #888; font-size: 12px; text-transform: uppercase; text-align: center; }

        .btn-accion {
            background: #0088cc; color: white; border: none; padding: 14px;
            border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s;
        }
        .btn-accion:active { transform: scale(0.97); }

        .btn-v { background: none; border: none; color: #ff4444; font-weight: bold; cursor: pointer; margin-top: 5px; font-size: 13px;}

        @media (max-width: 850px) {
            .layout-detalles { flex-direction: column; align-items: center; gap: 20px; padding: 15px; }
            .img-lateral { width: 220px; flex: none; margin-top: 10px; }
            .info-derecha { align-items: center; text-align: center; }
            .titulo-anime { font-size: 28px; }
            .generos { justify-content: center; }
            .caja-sinopsis { text-align: left; }
        }
    </style>
</head>
<body>

    <div class="controles-app"></div>

    <div id="vista-catalogo">
        <div class="header-catalogo">
            <h1 class="titulo-principal">AKaergsty</h1>
            <input type="text" id="buscador" placeholder="Buscar anime..." oninput="filtrar()">
        </div>
        <div class="grid-animes" id="grid"></div>
    </div>

    <div id="vista-detalles">
        <img id="bg-bluroso" class="bg-banner" src="" alt="">
        <div class="layout-detalles">
            <div class="img-lateral">
                <img id="det-img" src="" alt="">
            </div>
            <div class="info-derecha">
                <h1 id="det-titulo" class="titulo-anime"></h1>
                
                <div id="det-estado" class="estado-container"></div>
                
                <div id="det-generos" class="generos"></div>
                <div class="caja-sinopsis"><p id="det-sinopsis"></p></div>
                <div class="centro-botones">
                    <div class="caja-botones" id="area-botones"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- INICIALIZACIÓN DE TELEGRAM WEB APP ---
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        tg.BackButton.onClick(() => {
            volverAlCatalogo();
        });

        const urlBaseGitHub = "https://raw.githubusercontent.com/Kaergsty/mi-kaergsty-app/main/img/";

        // --- BASE DE DATOS ACTUALIZADA CON ESTADO ---
        const base = {
            "Jigokuraku": {
                sinopsis: "Gabimaru el Vacío busca el elixir de la inmortalidad en una isla misteriosa.",
                generos: ["Acción", "Aventura", "Fantasía"],
                estado: "Finalizado", // <--- NUEVO
                enlaces: { "Temporada 1": { "Latino": "https://t.me/c/123/1", "Japonés": "https://t.me/c/123/2" } }
            },
            "Solo Leveling": {
                sinopsis: "El cazador más débil Sung Jin-woo recibe un extraño sistema para subir de nivel.",
                portada: "https://m.media-amazon.com/images/M/MV5BM2M4YzdkMTEtMjUyYy00ZWY0LWI5ODQtNGRkZWQ1MzU5MWM2XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg",
                generos: ["Acción", "Aventura", "Fantasía"],
                estado: "Finalizado", // <--- NUEVO
                enlaces: { "Temporada 1": { "Latino": "https://t.me/c/123/3" } }
            },
            "Demi chan wa kataritai": {
                sinopsis: "Un profesor de Biología busca comprender a las 'demi', seres que comienzan a ser aceptados en la sociedad.",
                generos: ["Comedia", "Escolares", "Fantasía", "Seinen"],
                estado: "En Emisión", // <--- NUEVO
                enlaces: { "Temporada 1": { "Japonés": "https://t.me/AnimeKaergsty1/4940", "Latino": "https://t.me/AnimeKaergsty1/4943" } }
            },
            // Ejemplo de anime en emisión para probar el punto verde
            "One Piece": {
                sinopsis: "Luffy y su tripulación buscan el legendario tesoro One Piece.",
                generos: ["Acción", "Aventura", "Comedia", "Shonen"],
                estado: "En Emisión", // <--- NUEVO
                portada: "https://m.media-amazon.com/images/M/MV5BMTNjNGU4NTUtYzc5Ni00MDk5LTk4ODAtZDIzMGY1N2RkMjk4XkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg",
                enlaces: { "Wano Arc": { "Japonés": "#", "Latino": "#" } }
            }
        };

        function cargar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "";
            for (const nombre in base) {
                const anime = base[nombre];
                const div = document.createElement('div');
                div.className = 'tarjeta-anime';
                div.onclick = () => abrir(nombre);
                
                let imgUrl = anime.portada ? anime.portada : urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
                
                div.innerHTML = `
                    <img src="${imgUrl}" onerror="this.src='https://via.placeholder.com/150x225/222/555?text=Error+Img'">
                    <div class="titulo-tarjeta">${nombre}</div>
                `;
                grid.appendChild(div);
            }
            tg.BackButton.hide();
        }

        function abrir(nombre) {
            const anime = base[nombre];
            let imgUrl = anime.portada ? anime.portada : urlBaseGitHub + encodeURIComponent(nombre) + ".webp";
            
            document.getElementById('det-img').src = imgUrl;
            document.getElementById('bg-bluroso').src = imgUrl;
            document.getElementById('det-titulo').innerText = nombre;
            document.getElementById('det-sinopsis').innerText = anime.sinopsis;

            // --- LÓGICA PARA GENERAR EL ESTADO ANIMADO ---
            const estCont = document.getElementById('det-estado');
            let puntoClase = "punto-rojo";
            let textoClase = "txt-finalizado";
            
            if (anime.estado === "En Emisión") {
                puntoClase = "punto-verde";
                textoClase = "txt-emision";
            }
            
            estCont.innerHTML = `
                <span>Estado:</span>
                <span class="punto ${puntoClase}"></span>
                <span class="${textoClase}">${anime.estado}</span>
            `;

            // Géneros
            const gens = document.getElementById('det-generos');
            gens.innerHTML = "";
            anime.generos.forEach(g => {
                gens.innerHTML += `<span class="tag">${g}</span>`;
            });

            document.getElementById('vista-catalogo').style.display = 'none';
            document.getElementById('vista-detalles').style.display = 'block';
            window.scrollTo(0,0);
            
            mostrarT(nombre);
            tg.BackButton.show();
        }

        function volverAlCatalogo() {
            document.getElementById('vista-detalles').style.display = 'none';
            document.getElementById('vista-catalogo').style.display = 'block';
            tg.BackButton.hide();
        }

        function mostrarT(nombre) {
            const area = document.getElementById('area-botones');
            area.innerHTML = `<span class="txt-guia">Temporadas</span>`;
            Object.keys(base[nombre].enlaces).forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion';
                btn.innerText = t;
                btn.onclick = () => mostrarI(nombre, t);
                area.appendChild(btn);
            });
        }

        function mostrarI(nombre, t) {
            const area = document.getElementById('area-botones');
            const links = base[nombre].enlaces[t];
            area.innerHTML = `<span class="txt-guia">Idiomas - ${t}</span>`;
            Object.keys(links).forEach(idioma => {
                const btn = document.createElement('button');
                btn.className = 'btn-accion';
                btn.innerText = idioma;
                btn.onclick = () => {
                    if (window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.openLink(links[idioma]);
                    } else {
                        window.open(links[idioma], '_blank');
                    }
                };
                area.appendChild(btn);
            });
            const back = document.createElement('button');
            back.className = 'btn-v';
            back.innerText = "← VOLVER A TEMPORADAS";
            back.onclick = () => mostrarT(nombre);
            area.appendChild(back);
        }

        function filtrar() {
            const v = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.tarjeta-anime').forEach(t => {
                t.style.display = t.innerText.toLowerCase().includes(v) ? 'block' : 'none';
            });
        }

        cargar();
    </script>
</body>
</html>
