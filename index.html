<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeKaergsty</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background: #1a1a1a; 
            color: white; 
            margin: 0; 
            padding-top: 80px; /* Esto baja todo para evitar el botón Cerrar */
        }

        h2 { 
            color: #0088cc; 
            margin-top: -50px;  /* Aumenta este número para bajar el título */
            padding-left: 180px; /* Aumenta este número para moverlo a la derecha */
            margin-bottom: 20px; 
        }

        .grid { 
            display: grid; 
            /* Crea columnas de 160px que empiezan desde la izquierda */
            grid-template-columns: repeat(auto-fill, 160px); 
            gap: 20px; 
            padding: 0 20px; 
            justify-content: start; 
        }

        .card { 
            background: #333; 
            border-radius: 12px; 
            overflow: hidden; 
            text-align: center; 
            padding-bottom: 12px; 
            width: 160px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card img { 
            width: 100%; 
            height: 230px; 
            object-fit: cover; 
            display: block;
        }

        .btn-play { 
            background: #0088cc; 
            color: white; 
            border: none; 
            padding: 8px 15px; 
            border-radius: 5px; 
            cursor: pointer; 
            margin-top: 10px; 
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>Anime Kaergsty</h2>
    <div class="grid">
        <div class="card">
            <img src="poster01.jpg" alt="Anime 1">
            <p>Episodio 01</p>
            <button class="btn-play" onclick="sendVideo('ep01')">Reproducir</button>
        </div>
        </div>
    </script>
</body>
</html>
